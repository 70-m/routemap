<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RouteMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root{
	--bg:#0d0f14;--panel:#151820;--border:#252a35;
	--accent:#00e5a0;--warn:#ff6b35;--demo:#f5c518;--nav:#a78bfa;
	--text:#e8eaf0;--muted:#6b7280;
	--tabh:50px;--topbar:48px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);}
#app{display:flex;flex-direction:column;height:100%;}

/* ── トップバー ── */
#topbar{height:var(--topbar);min-height:var(--topbar);background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--text);}
/* アプリバージョン表示 */
#app-version{margin-left:auto;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.4px;white-space:nowrap;}

/* ── タブバー ── */
#tabbar{height:var(--tabh);min-height:var(--tabh);background:var(--panel);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-family:'Space Mono',monospace;transition:color .2s,border-color .2s;user-select:none;-webkit-tap-highlight-color:transparent;}
.tab .tab-icon{font-size:16px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab .tab-badge{font-size:8px;background:var(--accent);color:#000;border-radius:8px;padding:0 4px;min-width:14px;text-align:center;line-height:14px;display:none;font-weight:700;}
.tab .tab-badge.show{display:inline-block;}

/* ── コンテンツ ── */
#content{flex:1;overflow:hidden;position:relative;}
.view{display:none;width:100%;height:100%;flex-direction:column;}
.view.active{display:flex;}

/* ════ NAVIタブ ════ */
#view-navi{overflow-y:auto;}
#view-navi::-webkit-scrollbar{width:4px;}
#view-navi::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.navi-section{padding:12px 16px;border-bottom:1px solid var(--border);}

/* GPS行 */
#gps-start-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;}
#gps-start-row input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
#gps-start-row label{font-size:12px;color:var(--muted);cursor:pointer;}
#gps-start-row.active{border-color:var(--accent);background:rgba(0,229,160,.07);}
#gps-start-row.active label{color:var(--accent);}

.input-row{display:flex;align-items:center;gap:9px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot.start{background:var(--accent);box-shadow:0 0 7px var(--accent);}
.dot.end{background:var(--warn);box-shadow:0 0 7px var(--warn);}
.connector{width:1px;height:13px;background:var(--border);margin-left:3px;}
input[type="text"]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s,box-shadow .2s;}
input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,160,.12);}
input[type="text"]::placeholder{color:var(--muted);}
input[type="text"]:disabled{opacity:.4;cursor:not-allowed;}
.loc-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:7px 8px;font-size:14px;transition:color .2s,border-color .2s;flex-shrink:0;}
.loc-btn:hover{color:var(--accent);border-color:var(--accent);}

#mode-select{display:flex;gap:6px;}
.mode-btn{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-family:'Noto Sans JP',sans-serif;padding:8px 4px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.mode-btn .icon{font-size:15px;}
.mode-btn.active{background:rgba(0,229,160,.1);border-color:var(--accent);color:var(--accent);}

#controls{display:flex;gap:8px;}
.btn-primary{flex:1;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.5px;padding:12px;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn-primary:hover{opacity:.85;}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:12px;padding:12px 14px;cursor:pointer;transition:color .2s,border-color .2s;}
.btn-secondary:hover{color:var(--text);border-color:var(--text);}

#status{padding:10px 12px;border-radius:8px;font-size:12px;display:none;}
#status.info{display:block;background:rgba(0,102,255,.13);border:1px solid rgba(0,102,255,.35);color:#6fa3ff;}
#status.error{display:block;background:rgba(255,107,53,.13);border:1px solid rgba(255,107,53,.35);color:var(--warn);}
.spinner{display:inline-block;width:9px;height:9px;border:2px solid rgba(0,229,160,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── ルート概要 ── */
#route-summary{display:none;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:13px 15px;}
#route-summary.visible{display:block;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.summary-item{display:flex;flex-direction:column;gap:2px;}
.summary-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.summary-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.summary-unit{font-size:11px;color:var(--muted);}
.summary-btns{display:flex;gap:8px;margin-top:10px;}
#navi-start-btn{flex:1;background:var(--nav);color:#000;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:11px;cursor:pointer;letter-spacing:.4px;transition:opacity .2s;}
#navi-start-btn:hover{opacity:.85;}
#demo-run-btn{flex:1;background:rgba(245,197,24,.09);border:1px solid var(--demo);border-radius:8px;color:var(--demo);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:11px;cursor:pointer;letter-spacing:.4px;transition:background .2s;}
#demo-run-btn:hover{background:rgba(245,197,24,.18);}

/* ══════════════════════════════
	 音声案内バナー
══════════════════════════════ */
#navi-bar{display:none;border:1px solid var(--nav);border-radius:10px;background:rgba(167,139,250,.08);flex-direction:column;gap:0;overflow:hidden;}
#navi-bar.visible{display:flex;}

/* 次の案内カード */
#navi-next{padding:12px 14px;display:flex;align-items:center;gap:12px;}
#navi-arrow{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
#navi-text-block{flex:1;min-width:0;}
#navi-dist-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--nav);font-weight:700;}
#navi-instruction{font-size:13px;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#navi-sub-info{font-size:10px;color:var(--nav);opacity:.8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#navi-lanes{padding:0 14px 8px;gap:5px;flex-wrap:wrap;}
#navi-lanes.visible{display:flex;}
#map-navi-lanes{padding:0 10px 6px;gap:4px;flex-wrap:wrap;}
#map-navi-lanes.visible{display:flex;}
.lane{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 3px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--nav);opacity:.3;font-size:13px;border:1px solid transparent;}
.lane.valid{opacity:1;background:rgba(167,139,250,.18);border-color:var(--nav);}

/* コントロール行 */
#navi-controls{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid rgba(167,139,250,.2);background:rgba(167,139,250,.04);}
#navi-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--nav);letter-spacing:1px;text-transform:uppercase;flex:1;}
.navi-ctrl-btn{background:none;border:1px solid rgba(167,139,250,.3);border-radius:6px;color:var(--nav);font-size:13px;padding:5px 8px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.navi-ctrl-btn:hover{background:rgba(167,139,250,.15);border-color:var(--nav);}
.navi-ctrl-btn.muted{color:var(--muted);border-color:var(--border);}
#navi-rerout-status{font-size:10px;color:var(--warn);font-family:'Space Mono',monospace;}

/* 逸脱バナー */
#navi-offroute{display:none;padding:8px 14px;background:rgba(255,107,53,.12);border-top:1px solid rgba(255,107,53,.3);font-size:11px;color:var(--warn);text-align:center;}

/* ── デモバー ── */
#demo-bar{display:none;padding:10px 14px;border:1px solid var(--border);border-radius:9px;background:rgba(245,197,24,.04);flex-direction:column;gap:7px;}
#demo-bar.visible{display:flex;}
.demo-label{font-size:9px;font-family:'Space Mono',monospace;color:var(--demo);letter-spacing:1px;text-transform:uppercase;}
.demo-controls{display:flex;gap:5px;align-items:center;}
.demo-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:6px 10px;cursor:pointer;transition:all .2s;}
.demo-btn:hover{border-color:var(--demo);color:var(--demo);}
#demo-speed-label{font-size:11px;color:var(--muted);margin-left:auto;font-family:'Space Mono',monospace;}
#demo-progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
#demo-progress-bar{height:100%;background:var(--demo);width:0%;border-radius:2px;transition:width .15s linear;}

/* ── ステップ ── */
.section-title{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
#steps-list{display:flex;flex-direction:column;gap:5px;}
.step-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;transition:border-color .2s,background .2s;}
.step-item.active-step{border-color:var(--nav);background:rgba(167,139,250,.07);}
.step-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);min-width:18px;padding-top:1px;}
.step-text{flex:1;line-height:1.5;}
.step-dist{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.step-sub{font-size:9px;color:var(--nav);opacity:.75;}

/* ════ MAPタブ ════ */
#view-map{position:relative;}
#leaflet-map{width:100%;height:100%;}
.map-fab{position:absolute;right:12px;z-index:900;width:42px;height:42px;background:var(--panel);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.5);transition:all .2s;}
.map-fab:hover{background:var(--bg);border-color:var(--accent);color:var(--accent);}
.map-fab:active{transform:scale(.92);}
.map-fab.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,.1);}
#center-btn{bottom:16px;}          /* 最下段 */
#zoom-out-btn{bottom:66px;}        /* 16 + 42 + 8 */
#zoom-in-btn{bottom:116px;}        /* 66 + 42 + 8 */
#hint-box{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(13,15,20,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:18px;padding:6px 14px;font-size:11px;color:var(--muted);z-index:900;pointer-events:none;white-space:nowrap;transition:opacity .3s;}

/* 地図上の音声案内オーバーレイ */
#map-navi-overlay{position:absolute;top:12px;left:12px;right:60px;z-index:800;display:none;pointer-events:none;}
#map-navi-overlay.visible{display:block;}
#map-navi-card{background:rgba(13,15,20,.92);backdrop-filter:blur(10px);border:1px solid var(--nav);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
#map-navi-arrow{font-size:26px;flex-shrink:0;}
#map-navi-info{flex:1;min-width:0;}
#map-navi-dist{font-family:'Space Mono',monospace;font-size:13px;color:var(--nav);font-weight:700;}
#map-navi-text{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#map-navi-sub{font-size:11px;color:var(--nav);opacity:.8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ════ LOGタブ ════ */
#view-log{flex-direction:column;}
#log-header{padding:11px 14px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--panel);}
.log-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;flex:1;}
#log-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:10px;}
#log-clear-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:9px;padding:3px 8px;cursor:pointer;font-family:'Space Mono',monospace;transition:color .2s,border-color .2s;}
#log-clear-btn:hover{color:var(--warn);border-color:var(--warn);}
#log-subtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
.log-tab{flex:1;padding:8px 4px;font-family:'Space Mono',monospace;font-size:9px;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;letter-spacing:.7px;text-transform:uppercase;}
.log-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
#log-body{flex:1;overflow-y:auto;}
#log-body::-webkit-scrollbar{width:4px;}
#log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.log-pane{display:none;padding:9px 12px;}
.log-pane.active{display:block;}
.log-empty{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:center;padding:28px 0;opacity:.6;}
.log-entry{margin-bottom:5px;border-radius:7px;border:1px solid var(--border);overflow:hidden;}
.log-hd{display:flex;align-items:center;gap:7px;padding:6px 10px;background:#0e1014;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.log-ts{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);min-width:52px;flex-shrink:0;}
.log-tag{font-family:'Space Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;}
.log-tag.req{background:rgba(0,102,255,.22);color:#6fa3ff;}
.log-tag.res{background:rgba(0,229,160,.16);color:var(--accent);}
.log-tag.parse{background:rgba(245,197,24,.14);color:var(--demo);}
.log-tag.info{background:rgba(107,114,128,.18);color:var(--muted);}
.log-tag.err{background:rgba(255,107,53,.18);color:var(--warn);}
.log-tag.voice{background:rgba(167,139,250,.18);color:var(--nav);}
.log-entry-title{flex:1;font-family:'Space Mono',monospace;font-size:9.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-tog{font-size:9px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.log-entry.open .log-tog{transform:rotate(90deg);}
.log-bd{display:none;padding:10px;background:var(--bg);border-top:1px solid var(--border);}
.log-entry.open .log-bd{display:block;}
.sv-sec{margin-bottom:12px;}
.sv-sec:last-child{margin-bottom:0;}
.sv-title{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;color:#6fa3ff;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #1c2030;}
.sv-row{display:flex;gap:8px;padding:1.5px 0;font-size:10.5px;line-height:1.65;}
.sv-key{font-family:'Space Mono',monospace;color:#7a9bbf;min-width:140px;flex-shrink:0;}
.sv-val{color:var(--text);word-break:break-all;}
.sv-val.num{color:var(--accent);font-family:'Space Mono',monospace;}
.sv-val.str{color:#f9c74f;}
.sv-val.dim{color:var(--muted);font-size:9.5px;}
.sv-val.coord{color:#c084fc;font-family:'Space Mono',monospace;}
.sv-tbl{width:100%;border-collapse:collapse;font-size:9.5px;margin-top:5px;}
.sv-tbl th{font-family:'Space Mono',monospace;color:var(--muted);text-align:left;padding:3px 5px;border-bottom:1px solid var(--border);font-weight:400;font-size:8.5px;letter-spacing:.5px;}
.sv-tbl td{padding:2.5px 5px;border-bottom:1px solid #141619;vertical-align:top;line-height:1.55;}
.sv-tbl tr:last-child td{border-bottom:none;}
.sv-tbl .tn{color:var(--muted);font-family:'Space Mono',monospace;width:20px;}
.sv-tbl .td{color:#f9c74f;font-family:'Space Mono',monospace;white-space:nowrap;width:52px;}
.sv-tbl .tt{color:var(--accent);font-family:'Space Mono',monospace;white-space:nowrap;width:62px;}
.sv-tbl .tm{color:var(--text);}
.sv-tbl .tname{color:var(--muted);font-size:9px;}
.log-raw{font-family:'Space Mono',monospace;font-size:9px;color:#6e8399;white-space:pre-wrap;word-break:break-all;line-height:1.65;max-height:60vh;overflow-y:auto;}
.log-raw::-webkit-scrollbar{width:3px;}
.log-raw::-webkit-scrollbar-thumb{background:var(--border);}
.raw-key{color:#6fa3ff;}.raw-str{color:#f9c74f;}.raw-num{color:var(--accent);}.raw-bool{color:#ff6b9d;}.raw-null{color:var(--muted);}

@keyframes gps-pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.6;}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;}}
@keyframes car-bounce{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.18);}}
.leaflet-container{background:#e8e0d8;}
/* leaflet デフォルトzoomコントロールは無効化済み */

@media(min-width:900px){
	#app{flex-direction:row;}
	#topbar{display:none;}
	#tabbar{display:none;}
	#content{display:flex;flex-direction:row;flex:1;}
	.view{display:flex!important;flex-direction:column;}
	#view-navi{width:340px;min-width:340px;border-right:1px solid var(--border);overflow-y:auto;}
	#view-map{flex:1;}
	#view-log{width:380px;min-width:380px;border-left:1px solid var(--border);}
}
</style>
</head>
<body>
<div id="app">
	<!-- トップバー（モバイル） -->
	<div id="topbar"><div class="logo">Route<span>Map</span></div><div id="app-version"></div></div>

	<!-- タブバー -->
	<div id="tabbar">
		<div class="tab active" data-view="navi"><span class="tab-icon">🗺</span><span>ナビ</span></div>
		<div class="tab" data-view="map"><span class="tab-icon">📍</span><span>地図</span></div>
		<div class="tab" data-view="log"><span class="tab-icon">📋</span><span>ログ</span><span class="tab-badge" id="badge-log">0</span></div>
	</div>

	<div id="content">

		<!-- ══ ナビタブ ══ -->
		<div class="view active" id="view-navi">

			<div class="navi-section">
				<div id="gps-start-row">
					<input type="checkbox" id="gps-start-chk">
					<label for="gps-start-chk">📍 現在地（GPS）を出発地にする</label>
				</div>
				<div class="input-row" style="margin-bottom:6px;">
					<div class="dot start"></div>
					<input type="text" id="start-input" placeholder="出発地を入力 or 地図をクリック">
					<button class="loc-btn" id="my-loc-btn">📍</button>
				</div>
				<div style="display:flex;align-items:center;padding-left:3px;margin-bottom:6px;"><div class="connector"></div></div>
				<div class="input-row">
					<div class="dot end"></div>
					<input type="text" id="end-input" placeholder="目的地を入力 or 地図をクリック">
					<button class="loc-btn" id="swap-btn">⇅</button>
				</div>
			</div>

			<div class="navi-section">
				<div id="mode-select">
					<button class="mode-btn active" data-mode="driving"><span class="icon">🚗</span>車</button>
					<button class="mode-btn" data-mode="cycling"><span class="icon">🚲</span>自転車</button>

// ════════════════════════════════════════════════
//  音声合成ユーティリティ
// ════════════════════════════════════════════════
function speak(text){
	if(naviMuted||!text)return;
	if(!window.speechSynthesis){console.warn('[speak] Web Speech API が利用できません');return;}
	console.log(`[speak] 音声合成開始: "${text}"`);
	window.speechSynthesis.cancel();
	const u=new SpeechSynthesisUtterance(text);
	u.lang='ja-JP';u.rate=1.05;u.pitch=1.0;u.volume=1.0;
	// 日本語音声を優先
	const voices=window.speechSynthesis.getVoices();
	const ja=voices.find(v=>v.lang.startsWith('ja'));
	if(ja)u.voice=ja;
	window.speechSynthesis.speak(u);
	logVoice(text);
}

// ════════════════════════════════════════════════
//  maneuver → 音声テキスト生成（全type対応）
// ════════════════════════════════════════════════
function makeVoiceText(type,modifier,roadName,distM,phase,ref,destinations,exits){
	const road=roadName?`「${roadName}」`:'';
	const distStr=distM>=1000?`${Math.round(distM/100)*100}メートル`
		:distM>=100?`${Math.round(distM/50)*50}メートル`
		:`約${Math.round(distM/10)*10}メートル`;
	const prefix=phase==='prep'?`${distStr}先、`
		:phase==='soon'?'まもなく、'
		:'';

	// 方向表現
	const dirMap={
		'uturn':'Uターン',
		'sharp right':'鋭角に右折',
		'right':'右折',
		'slight right':'やや右に進んで',
		'straight':'直進',
		'slight left':'やや左に進んで',
		'left':'左折',
		'sharp left':'鋭角に左折'
	};
	const dir=dirMap[modifier]||'';

	switch(type){
		case 'depart':
			return '案内を開始します。出発してください。';
		case 'arrive':
			return '目的地付近です。案内を終了します。';
		case 'turn': {
			if(modifier==='uturn') return `${prefix}Uターンしてください。`;
			if(phase==='now') return `${dir}してください。`;
			const refStr=ref?`${ref}です。`:'';
			return `${prefix}${dir}してください。${road}${refStr}`;
		}
		case 'continue':
			if(phase==='prep') return `${distStr}先、直進です。${road}`;
			if(phase==='soon') return `まもなく、直進です。${road}`;
			return '直進してください。';
		case 'new name':
			if(phase==='prep') return `${distStr}先、道なりに進んでください。${road}`;
			if(phase==='soon') return `まもなく、道なりに進んでください。${road}`;
			return '道なりに進んでください。';
		case 'fork': {
			const destStr=destinations?`${destinations}方面へ。`:'';
			if(phase==='now'){
				if(modifier==='slight right'||modifier==='right') return '右方向に進んでください。';
				if(modifier==='slight left'||modifier==='left')  return '左方向に進んでください。';
				return '分岐を直進してください。';
			}
			if(modifier==='slight right'||modifier==='right') return `${prefix}右方向に進んでください。${destStr}${road}`;
			if(modifier==='slight left'||modifier==='left')  return `${prefix}左方向に進んでください。${destStr}${road}`;
			return `${prefix}分岐を直進してください。${destStr}${road}`;
		}
		case 'merge': {
			if(phase==='now'){
				if(modifier==='right') return '右から合流してください。';
				if(modifier==='left')  return '左から合流してください。';
				return '合流してください。';
			}
			if(modifier==='right') return `${prefix}右から合流してください。${road}`;
			if(modifier==='left')  return `${prefix}左から合流してください。${road}`;
			return `${prefix}合流してください。${road}`;
		}
		case 'on ramp': {
			const destStr=destinations?`${destinations}方面へ。`:'';
			if(phase==='now'){
				if(modifier==='right') return '右のランプから進入してください。';
				if(modifier==='left')  return '左のランプから進入してください。';
				return 'ランプから進入してください。';
			}
			if(modifier==='right') return `${prefix}右のランプから進入してください。${destStr}`;
			if(modifier==='left')  return `${prefix}左のランプから進入してください。${destStr}`;
			return `${prefix}ランプから進入してください。${destStr}`;
		}
		case 'off ramp': {
			const destStr=destinations?`${destinations}方面。`:'';
			if(phase==='now'){
				if(exits) return `出口${exits}から出てください。`;
				return '出口から出てください。';
			}
			if(exits) return `${prefix}出口${exits}から出てください。${destStr}`;
			if(modifier==='right') return `${prefix}右の出口から出てください。${destStr}`;
			if(modifier==='left')  return `${prefix}左の出口から出てください。${destStr}`;
			return `${prefix}出口から出てください。${destStr}`;
		}
		case 'end of road': {
			if(phase==='now'){
				if(modifier==='right')    return '突き当たりを右折してください。';
				if(modifier==='left')     return '突き当たりを左折してください。';
				if(modifier==='straight') return '突き当たりをそのまま直進してください。';
				return '突き当たりです。';
			}
			if(modifier==='right')    return `${prefix}突き当たりを右折してください。${road}`;
			if(modifier==='left')     return `${prefix}突き当たりを左折してください。${road}`;
			if(modifier==='straight') return `${prefix}突き当たりをそのまま直進してください。${road}`;
			return `${prefix}突き当たりです。${road}`;
		}
		case 'roundabout':
		case 'roundabout turn': {
			const exitNum=naviSteps[naviCurrentStepIdx]?.exit;
			const exitStr=exitNum?`${exitNum}番出口で`:'';
			return `${prefix}ラウンドアバウトに入り、${exitStr}出てください。`;
		}
		case 'rotary': {
			const exitNum=naviSteps[naviCurrentStepIdx]?.exit;
			const exitStr=exitNum?`${exitNum}番出口で`:'';
			const name=naviSteps[naviCurrentStepIdx]?.rotary_name||'ロータリー';
			return `${prefix}${name}に入り、${exitStr}出てください。`;
		}
		case 'exit_roundabout':
			if(phase==='now') return 'ラウンドアバウトを出てください。';
			return `${prefix}ラウンドアバウトを出てください。${road}`;
		case 'exit_rotary':
			if(phase==='now') return 'ロータリーを出てください。';
			return `${prefix}ロータリーを出てください。${road}`;
		case 'notification':
			return ''; // スキップ
		default:
			return dir?`${prefix}${dir}してください。`:'';
	}
}

// exits / destinations / ref をサブ情報文字列として整形
function makeSubInfo(step){
	const parts=[];
	if(step.exits)        parts.push(`出口 ${step.exits}`);
	if(step.destinations) parts.push(`${step.destinations}方面`);
	if(step.ref)          parts.push(step.ref);
	return parts.join('  ');
}

// 車線インジケーターHTML文字列を生成
function makeLaneHtml(lanes){
	if(!lanes||!lanes.length)return'';
	const arrowMap={
		'uturn':'↩','sharp left':'↰','left':'←','slight left':'↙',
		'straight':'↑','none':'↑','slight right':'↘','right':'→','sharp right':'↱'
	};
	return lanes.map(lane=>{
		const arrows=(lane.indications||['straight']).map(i=>arrowMap[i]||'↑').join('');
		return `<span class="lane${lane.valid?' valid':''}">${arrows}</span>`;
	}).join('');
}

// 車線案内音声テキストを生成（prep / soon フェーズ用）
function makeLaneVoice(lanes){
	if(!lanes||!lanes.length)return'';
	const valid=lanes.filter(l=>l.valid);
	if(!valid.length)return'';
	const hasRight=valid.some(l=>l.indications?.some(i=>i.includes('right')));
	const hasLeft =valid.some(l=>l.indications?.some(i=>i.includes('left')));
	const hasStraight=valid.some(l=>l.indications?.some(i=>i==='straight'||i==='none'));
	if(hasRight&&!hasLeft&&!hasStraight)return'右車線を走ってください。';
	if(hasLeft&&!hasRight&&!hasStraight)return'左車線を走ってください。';
	return'';
}

// maneuver → 矢印絵文字
function maneuverArrow(type,modifier){
	if(type==='arrive') return '🏁';
	if(type==='depart') return '🚀';
	if(type==='roundabout'||type==='rotary'||type==='roundabout turn') return '🔄';
	if(type==='exit_roundabout'||type==='exit_rotary') return '↪';
	if(type==='on ramp') return '↗';
	if(type==='off ramp') return '↙';
	if(type==='fork'){return modifier?.includes('right')?'↗':'↖';}
	if(type==='merge') return '⇒';
	if(type==='end of road'){
		if(modifier==='right') return '⤵';
		if(modifier==='left')  return '⤴';
		return '⬆';
	}
	const m={
		'uturn':'↩','sharp right':'↪','right':'➡',
		'slight right':'↗','straight':'⬆',
		'slight left':'↖','left':'⬅','sharp left':'↩'
	};
	return m[modifier]||'⬆';
}

// maneuver → 表示テキスト（バナー用）
function maneuverLabel(type,modifier,roadName,ref,destinations,exits){
	const road=roadName?`「${roadName}」`:'';
	const refStr=ref?` (${ref})`:'';
	switch(type){
		case 'depart': return '出発';
		case 'arrive': return '目的地に到着';
		case 'turn':
			if(modifier==='uturn') return 'Uターン';
			if(modifier==='sharp right') return `鋭角右折 ${road}${refStr}`;
			if(modifier==='right') return `右折 ${road}${refStr}`;
			if(modifier==='slight right') return `やや右 ${road}${refStr}`;
			if(modifier==='straight') return `直進 ${road}${refStr}`;
			if(modifier==='slight left') return `やや左 ${road}${refStr}`;
			if(modifier==='left') return `左折 ${road}${refStr}`;
			if(modifier==='sharp left') return `鋭角左折 ${road}${refStr}`;
			return `曲がる ${road}${refStr}`;
		case 'continue': return `直進 ${road}${refStr}`;
		case 'new name': return `道なり ${road}${refStr}`;
		case 'fork': return modifier?.includes('right')
			?`右方向 ${destinations||road}`
			:`左方向 ${destinations||road}`;
		case 'merge': return `合流 ${road}`;
		case 'on ramp': return destinations?`ランプ進入 ${destinations}方面`:`ランプ進入 ${road}`;
		case 'off ramp': return exits?`出口${exits} ${road}`:`出口 ${road}`;
		case 'end of road':
			if(modifier==='right') return `突き当たり右折 ${road}`;
			if(modifier==='left')  return `突き当たり左折 ${road}`;
			return `突き当たり直進 ${road}`;
		case 'roundabout':
		case 'roundabout turn': return 'ラウンドアバウト';
		case 'rotary': return 'ロータリー';
		case 'exit_roundabout': return 'ラウンドアバウト退出';
		case 'exit_rotary': return 'ロータリー退出';
		default: return road||type;
	}
}

//  ジオコーディング
// ════════════════════════════════════════════════
async function geocode(q){
	console.log(`[geocode] ジオコーディング開始: "${q}"`);
	const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&accept-language=ja`,{headers:{'User-Agent':'RouteMapApp/1.0'}});
	const d=await r.json();
	if(!d.length){console.warn(`[geocode] 結果なし: "${q}"`);throw new Error(`"${q}" の場所が見つかりませんでした`);}
	console.log(`[geocode] 成功: ${d[0].display_name} (${d[0].lat}, ${d[0].lon})`);
	return{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),name:d[0].display_name};
}
async function revGeo(lat,lng){
	console.log(`[revGeo] 逆ジオコーディング開始: (${lat.toFixed(5)}, ${lng.toFixed(5)})`);
	try{
		const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`,{headers:{'User-Agent':'RouteMapApp/1.0'}});
		const d=await r.json();
		if(d.display_name){console.log(`[revGeo] 成功: ${d.display_name}`);return d.display_name;}
		console.warn('[revGeo] display_name なし、座標文字列にフォールバック');
		return `${lat.toFixed(5)},${lng.toFixed(5)}`;
	}catch(e){console.error(`[revGeo] エラー: ${e.message}`);return `${lat.toFixed(5)},${lng.toFixed(5)}`;}
}

//  ルート検索

async function searchRoute(){
	console.log('[searchRoute] ルート検索開始');
	stopDemo();stopNavi();
	const si=document.getElementById('start-input').value.trim();
	const ei=document.getElementById('end-input').value.trim();
	showStatus('<span class="spinner"></span>ルートを検索中...','info');
	document.getElementById('route-summary').classList.remove('visible');
	document.getElementById('summary-section').style.display='none';
	document.getElementById('steps-section').style.display='none';
	document.getElementById('navi-section').style.display='none';
	document.getElementById('demo-section').style.display='none';
	document.getElementById('steps-list').innerHTML='';

	try{
		if(useGpsAsStart){
			if(!gpsLatLng)throw new Error('GPS位置を取得中です。少々お待ちください');
			if(startMarker)map.removeLayer(startMarker);
			startLatLng=gpsLatLng;
			startMarker=L.marker([gpsLatLng.lat,gpsLatLng.lng],{icon:startIcon}).addTo(map);
			document.getElementById('start-input').value='現在地（GPS）';
		}else{
			if(!startLatLng&&si){const r=await geocode(si);setStart(r,r.name);}
		}
		if(!endLatLng&&ei){const r=await geocode(ei);setEnd(r,r.name);}
		if(!startLatLng){console.warn('[searchRoute] 出発地未設定');throw new Error('出発地を設定してください');}
		if(!endLatLng){console.warn('[searchRoute] 目的地未設定');throw new Error('目的地を設定してください');}

		const serverProfiles={driving:["routed-car","driving"],cycling:["routed-bike","bike"],foot:["routed-foot","foot"]};
		const [srv,prof]=serverProfiles[selectedMode];
		const url=`https://routing.openstreetmap.de/${srv}/route/v1/${prof}/${startLatLng.lng},${startLatLng.lat};${endLatLng.lng},${endLatLng.lat}?overview=full&geometries=geojson&steps=true`;
		console.log(`[searchRoute] OSRM API 呼び出し: ${url}`);
		logRequest(url);
		const res=await fetch(url);
		const data=await res.json();
		if(data.code!=='Ok'){console.error(`[searchRoute] ルート取得失敗: code=${data.code}`);throw new Error('ルートが見つかりませんでした');}

		logRouteResponse(data);
		const route=data.routes[0];
		demoCoords=route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);

		// naviSteps: 全ステップをフラット化して保持
		naviSteps=[];
		(route.legs||[]).forEach(leg=>{
			(leg.steps||[]).forEach(step=>{
				naviSteps.push({
					type:step.maneuver?.type||'',
					modifier:step.maneuver?.modifier||'',
					location:step.maneuver?.location||[0,0], // [lng,lat]
					name:step.name||'',
					distance:step.distance,
					duration:step.duration,
					exit:step.maneuver?.exit,
					rotary_name:step.rotary_name||'',
					ref:step.ref||'',
					destinations:step.destinations||'',
					exits:step.exits||'',
					lanes:step.intersections?.[0]?.lanes||[]
				});
			});
		});

		console.log(`[searchRoute] ルート取得成功: ${(route.distance/1000).toFixed(1)}km / ${Math.round(route.duration/60)}分 / ${naviSteps.length}ステップ`);
		drawRoute(route);
		showSummary(route);
		hideStatus();
		goToMap();
	}catch(err){
		console.error(`[searchRoute] エラー: ${err.message}`);
		showStatus(`⚠ ${err.message}`,'error');
		logError(err.message);
	}
}

function drawRoute(route){
	console.log(`[drawRoute] ルート描画: ${route.geometry.coordinates.length} 座標点`);
	if(routeLayer)map.removeLayer(routeLayer);
	const coords=route.geometry.coordinates.map(([lng,lat])=>[lat,lng]);
	const glow=L.polyline(coords,{color:'rgba(0,229,160,.16)',weight:14,lineCap:'round'}).addTo(map);
	const line=L.polyline(coords,{color:'#00e5a0',weight:4,lineCap:'round'}).addTo(map);
	routeLayer=L.layerGroup([glow,line]).addTo(map);
	map.fitBounds(L.latLngBounds(coords),{padding:[40,40]});
}

//  ステップマーカー・手順一覧の再構築（共通処理）
// ════════════════════════════════════════════════
function rebuildStepMarkersAndList(route){
	// naviSteps を route から再構築（リルート時も対応）
	// ※ showSummary 経由の場合は呼び出し前に naviSteps 構築済み
	// ※ reroute 経由の場合も呼び出し前に naviSteps 構築済み
	console.log(`[rebuildStepMarkersAndList] ステップマーカー再構築: ${naviSteps.length} ステップ`);

	const list=document.getElementById('steps-list');
	list.innerHTML='';

	let n=1;
	naviSteps.forEach((step,i)=>{
		if(!step.name&&step.distance<1)return;
		const num=n++;
		const d=step.distance<1000?`${step.distance.toFixed(0)}m`:`${(step.distance/1000).toFixed(1)}km`;
		const el=document.createElement('div');el.className='step-item';
		const sub=makeSubInfo(step);
		el.innerHTML=`<span class="step-num">${num}</span>`
			+`<span class="step-text">${maneuverArrow(step.type,step.modifier)} ${maneuverLabel(step.type,step.modifier,step.name,step.ref,step.destinations,step.exits)}`
			+(sub?`<br><span class="step-sub">${sub}</span>`:'')
			+`</span>`
			+`<span class="step-dist">${d}</span>`;
		list.appendChild(el);
		demoSteps.push({el, lat:step.location[1], lng:step.location[0], naviIdx:i, num});

		// 地図上にステップ番号マーカーを追加（depart/arrive/notification は除外）
		if(step.type!=='depart'&&step.type!=='notification'&&step.type!=='arrive'){
			const icon=L.divIcon({
				className:'',
				html:`<div style="width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #252a35;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#252a35;box-shadow:0 1px 6px rgba(0,0,0,.4);line-height:1;">${num}</div>`,
				iconSize:[22,22],iconAnchor:[11,11]
			});
			const m=L.marker([step.location[1],step.location[0]],{icon,zIndexOffset:200}).addTo(map);
			stepMarkers.push(m);
		}
	});
}

// 案内開始
async function startNavi(){

	console.log('[startNavi] 音声案内開始');
	stopDemo();
	naviActive=true;
	naviSpoken={};
	naviCurrentStepIdx=0;
	naviFirstGps=true;  // 初回GPS取得時にステップ位置を補正する
	naviApproaching=false;
	naviPrevDist=Infinity;
	naviMuted=false;
	document.getElementById('navi-mute-btn').textContent='🔊';
	document.getElementById('navi-section').style.display='block';
	document.getElementById('navi-bar').classList.add('visible');
	document.getElementById('navi-offroute').style.display='none';
	document.getElementById('map-navi-overlay').classList.add('visible');

		}catch(e){console.warn(`[startNavi] Wake Lock 取得失敗: ${e.message}`);}
	}

	// GPS追跡開始（案内専用）
	if(navigator.geolocation){
		naviWatchId=navigator.geolocation.watchPosition(
			pos=>onNaviGps(pos),
			err=>{console.error(`[startNavi] GPS エラー: ${err.message}`);logError(`案内GPS: ${err.message}`);},
			{enableHighAccuracy:true,timeout:10000,maximumAge:1000}
		);
	}else{
		console.warn('[startNavi] Geolocation API 未対応');
		showStatus('GPS が使えないためデモ位置で案内します','info');
	}

	// 出発の発話
	speak(makeVoiceText('depart','','','',null));
	updateNaviBanner(naviCurrentStepIdx,null);
	highlightNaviStep(naviCurrentStepIdx);
	goToMap();
	logVoice('案内開始');
}

// 案内開始直後の初回GPS取得フラグ
let naviFirstGps = false;

// GPS更新 → 案内ロジック
function onNaviGps(pos){
	// デモ走行中はGPS更新を無視する
	if(isDemoActive){console.log('[onNaviGps] デモ走行中のためGPS更新をスキップ');return;}
	const lat=pos.coords.latitude,lng=pos.coords.longitude;
	const acc=pos.coords.accuracy;
	const curPos=[lat,lng];
	console.log(`[onNaviGps] GPS更新: (${lat.toFixed(5)}, ${lng.toFixed(5)}) 精度:±${acc.toFixed(0)}m`);

	// GPS自車マーカー更新（案内中は naviCarIcon）
	if(gpsMarker)map.removeLayer(gpsMarker);
	if(gpsAccCircle)map.removeLayer(gpsAccCircle);
	gpsMarker=L.marker(curPos,{icon:naviCarIcon,zIndexOffset:1000}).addTo(map);
	gpsLatLng={lat,lng};
	map.setView(curPos,17);

	if(!naviActive)return;

	// ── 初回GPS取得時：現在地から最も近い未来ステップを探してスキップ ──
	if(naviFirstGps){
		naviFirstGps=false;
		seekNearestStep(curPos);
	}

	// 逸脱チェック（ルート座標から50m以上離れたらリルート）
	const minDist=minDistToRoute(curPos);
	if(minDist>50){
		console.warn(`[onNaviGps] ルート逸脱検出: ${minDist.toFixed(0)}m 離れています`);
		document.getElementById('navi-offroute').style.display='block';
		reroute(lat,lng);
	}else{
		document.getElementById('navi-offroute').style.display='none';
	}

	// 次のステップまでの距離を計算して案内発話
	checkAndSpeak(curPos);
}

// 現在地から見て「これから向かうべき最初のステップ」を探してセット
function seekNearestStep(curPos){
	// 戦略：現在地に最も近いステップを起点とし、
	// そこから先のステップのうち現在地より「前方」にあるものを案内開始点とする。
	// 簡易実装：全ステップを走査し、現在地から一番近いステップのインデックスを採用。
	// depart/notification は飛ばす。
	let bestIdx = naviCurrentStepIdx;
	let bestDist = Infinity;
	for(let i = naviCurrentStepIdx; i < naviSteps.length; i++){
		const s = naviSteps[i];
		if(s.type === 'notification') continue;
		const d = haversine(curPos, [s.location[1], s.location[0]]);
		if(d < bestDist){
			bestDist = d;
			bestIdx = i;
		}
	}
	// 最近ステップが depart なら次へ（出発点は通過済みとみなす）
	if(naviSteps[bestIdx]?.type === 'depart' && bestIdx < naviSteps.length - 1){
		bestIdx++;
	}
	console.log(`[seekNearestStep] 最近傍ステップ: インデックス=${bestIdx} 距離=${bestDist.toFixed(0)}m`);
	if(bestIdx !== naviCurrentStepIdx){
		naviCurrentStepIdx = bestIdx;
		naviSpoken      = {};
		naviApproaching = false;
		naviPrevDist    = Infinity;
		updateNaviBanner(naviCurrentStepIdx, null);
		highlightNaviStep(naviCurrentStepIdx);
		logVoice(`案内開始位置を調整：ステップ${bestIdx}から開始`);
	}
}

// 現在位置から次ステップまでの距離 → 発話
function checkAndSpeak(curPos){
	// notification はスキップして最初の有効ステップを探す
	while(
		naviCurrentStepIdx < naviSteps.length &&
		naviSteps[naviCurrentStepIdx].type === 'notification'
	){ naviCurrentStepIdx++; }

	if(naviCurrentStepIdx >= naviSteps.length) return;

	// 移動手段別の発話閾値
	const isFoot = selectedMode === 'foot';
	const THR_SOON = isFoot ?   5 :  50;  // 直前フェーズの下限（m）
	const THR_NOW  = isFoot ?   5 :  50;  // 実行フェーズの閾値（m）

	// ── 案D：最近接点通過判定 ──
	// 現在ステップの案内点までの距離を計算
	const step = naviSteps[naviCurrentStepIdx];
	const dist = haversine(curPos, [step.location[1], step.location[0]]);

	// ① APPROACH_THR(30m)以内に入ったら接近監視ON
	if(dist <= APPROACH_THR){
		naviApproaching = true;
	}

	// ② 通過判定：接近後に距離が増加（最近接点を通過）or FALLBACK_THR(60m)超で強制通過
	const passed =
		(naviApproaching && dist > naviPrevDist && naviPrevDist <= APPROACH_THR) || // 最近接点通過
		(naviApproaching && dist > FALLBACK_THR);                                    // 強制フォールバック

	naviPrevDist = dist; // 前フレーム距離を更新

	if(passed && naviCurrentStepIdx < naviSteps.length - 1){
		naviCurrentStepIdx++;
		naviSpoken      = {};
		naviApproaching = false;
		naviPrevDist    = Infinity;

		// notification をスキップ
		while(
			naviCurrentStepIdx < naviSteps.length &&
			naviSteps[naviCurrentStepIdx].type === 'notification'
		){ naviCurrentStepIdx++; }

		// 到着チェック
		if(naviSteps[naviCurrentStepIdx]?.type === 'arrive' ||
			 naviCurrentStepIdx >= naviSteps.length - 1){
			speak(makeVoiceText('arrive','','','',null));
			updateNaviBanner(naviCurrentStepIdx, null);
			highlightNaviStep(naviCurrentStepIdx);
			setTimeout(()=>stopNavi(), 3000);
			return;
		}
		updateNaviBanner(naviCurrentStepIdx, null);
		highlightNaviStep(naviCurrentStepIdx);
		return;
	}

	// 発話判定（各フェーズ1回のみ）
	// ① 予告（200〜400m手前）：移動手段共通
	if(dist > 200 && dist <= 400 && !naviSpoken[`${naviCurrentStepIdx}_prep`]){
		naviSpoken[`${naviCurrentStepIdx}_prep`] = true;
		console.log(`[checkAndSpeak] 予告フェーズ: ステップ${naviCurrentStepIdx} 残り${dist.toFixed(0)}m`);
		speak(makeVoiceText(step.type, step.modifier, step.name, dist, 'prep', step.ref, step.destinations, step.exits)+makeLaneVoice(step.lanes));
	}
	// ② 直前（THR_SOON〜200m手前）
	else if(dist > THR_SOON && dist <= 200 && !naviSpoken[`${naviCurrentStepIdx}_soon`]){
		naviSpoken[`${naviCurrentStepIdx}_soon`] = true;
		console.log(`[checkAndSpeak] 直前フェーズ: ステップ${naviCurrentStepIdx} 残り${dist.toFixed(0)}m`);
		speak(makeVoiceText(step.type, step.modifier, step.name, dist, 'soon', step.ref, step.destinations, step.exits)+makeLaneVoice(step.lanes));
	}
	// ③ 実行（≤THR_NOW）
	else if(dist <= THR_NOW && !naviSpoken[`${naviCurrentStepIdx}_now`]){
		naviSpoken[`${naviCurrentStepIdx}_now`] = true;
		console.log(`[checkAndSpeak] 実行フェーズ: ステップ${naviCurrentStepIdx} 残り${dist.toFixed(0)}m`);
		speak(makeVoiceText(step.type, step.modifier, step.name, dist, 'now', step.ref, step.destinations, step.exits));
	}

	// バナーは約 300ms ごとに更新（可視 DOM への毎フレーム repaint を防ぐ）
	const _bNow=performance.now();
	if(_bNow-lastBannerUpdateTime>=300){lastBannerUpdateTime=_bNow;updateNaviBanner(naviCurrentStepIdx,dist);}
	// ハイライトはステップが変化したときのみ更新（毎フレーム呼ぶと地図の repaint でRAFが停止するため）
	if(naviCurrentStepIdx!==lastHighlightedStep){
		lastHighlightedStep=naviCurrentStepIdx;
		highlightNaviStep(naviCurrentStepIdx);
	}
}

// 案内バナー更新
function updateNaviBanner(stepIdx,dist){

		:dist>=1000?`${(dist/1000).toFixed(1)}km先`

// ステップ一覧のハイライト（naviCurrentStepIdx と demoSteps の naviIdx で照合）
function highlightNaviStep(naviIdx){
	demoSteps.forEach(({el,naviIdx:ni})=>el.classList.toggle('active-step',ni===naviIdx));
	// アクティブなステップをリスト内にスクロールして見せる
	const activeItem=demoSteps.find(({naviIdx:ni})=>ni===naviIdx);
	if(activeItem?.el)activeItem.el.scrollIntoView({behavior:'smooth',block:'nearest'});
	// 地図上のステップマーカーも強調（アクティブなもの以外を薄く）
	let markerPos=0;
	demoSteps.forEach(({naviIdx:ni,num},i)=>{
		const s=naviSteps[ni];
		if(!s)return;// naviSteps との同期ズレを防ぐ
		if(s.type==='depart'||s.type==='notification')return;
		const m=stepMarkers[markerPos++];
		if(!m)return;
		const isActive=ni===naviIdx;
		m.getElement()&&(m.getElement().style.opacity=isActive?'1':'0.45');
		if(isActive){
			m.getElement()&&Object.assign(m.getElement().firstChild.style,{
				background:'#a78bfa',color:'#fff',borderColor:'#a78bfa'
			});
		}else{
			m.getElement()&&Object.assign(m.getElement().firstChild.style,{
				background:'#fff',color:'#252a35',borderColor:'#252a35'
			});
		}
	});
}

// ルートまでの最短距離
function minDistToRoute(pos){
	if(!demoCoords.length)return 0;
	let min=Infinity;
	for(const c of demoCoords){const d=haversine(pos,c);if(d<min)min=d;}
	return min;
}

// リルート
async function reroute(lat,lng){
	const now=Date.now();
	if(now-lastRerouteTime<12000){console.warn('[reroute] クールダウン中のためスキップ');return;}
	console.log(`[reroute] 再ルート探索開始: (${lat.toFixed(5)}, ${lng.toFixed(5)})`);
	lastRerouteTime=now;
	document.getElementById('navi-rerout-status').textContent='再探索中...';
	speak('ルートを外れました。再探索します。');
	try{
		const [srv2,prof2]=({driving:['routed-car','driving'],cycling:['routed-bike','bike'],foot:['routed-foot','foot']})[selectedMode];const url=`https://routing.openstreetmap.de/${srv2}/route/v1/${prof2}/${lng},${lat};${endLatLng.lng},${endLatLng.lat}?overview=full&geometries=geojson&steps=true`;
		const res=await fetch(url);
		const data=await res.json();
		if(data.code!=='Ok'){console.error(`[reroute] OSRM 応答エラー: code=${data.code}`);throw new Error('再探索失敗');}
		const route=data.routes[0];
		demoCoords=route.geometry.coordinates.map(([lo,la])=>[la,lo]);
		naviSteps=[];
		(route.legs||[]).forEach(leg=>{
			(leg.steps||[]).forEach(step=>{
				naviSteps.push({type:step.maneuver?.type||'',modifier:step.maneuver?.modifier||'',location:step.maneuver?.location||[0,0],name:step.name||'',distance:step.distance,duration:step.duration,exit:step.maneuver?.exit,rotary_name:step.rotary_name||'',ref:step.ref||'',destinations:step.destinations||'',exits:step.exits||'',lanes:step.intersections?.[0]?.lanes||[]});
			});
		});
		naviCurrentStepIdx=0;naviSpoken={};naviApproaching=false;naviPrevDist=Infinity;

		// 古いステップマーカーを削除して新ルートで再生成
		stepMarkers.forEach(m=>map.removeLayer(m));
		stepMarkers=[];
		demoSteps=[];
		rebuildStepMarkersAndList(route);

		drawRoute(route);
		document.getElementById('navi-offroute').style.display='none';
		document.getElementById('navi-rerout-status').textContent='';
		console.log('[reroute] 再ルート取得成功');
		speak('ルートを再設定しました。');
		logVoice('リルート完了');
	}catch(e){
		console.error(`[reroute] エラー: ${e.message}`);
		document.getElementById('navi-rerout-status').textContent='再探索失敗';
		logError('リルート失敗: '+e.message);
	}
}

const BASE_SPD=60;
function startDemo(){
	if(demoCoords.length<2){console.warn('[startDemo] ルート座標が不足しているためデモ開始不可');logDebug('[startDemo] 座標不足のため開始不可');return;}

	logDebug(`[startDemo] 開始 座標数:${demoCoords.length}`);
	stopDemo();stopNavi();
	isDemoActive=true;
	// 案内状態を初期化
	naviActive=true;naviSpoken={};naviCurrentStepIdx=0;lastHighlightedStep=-1;naviApproaching=false;naviPrevDist=Infinity;naviMuted=false;

	document.getElementById('demo-bar').classList.add('visible');
	demoIdx=0;demoFrac=0;demoPaused=false;lastDemoTs=null;
	// マイルストーンフラグ初期化
	demoMilestone25=false;demoMilestone50=false;demoMilestone75=false;
	document.getElementById('demo-progress-bar').style.width='0%';
	if(demoMarker)map.removeLayer(demoMarker);
	if(demoTrail){map.removeLayer(demoTrail);demoTrail=null;}
	demoMarker=L.marker(demoCoords[0],{icon:carIcon,zIndexOffset:1000}).addTo(map);
	// demoTrail（軌跡ポリライン）は廃止：毎フレームのSVG再描画がRAFを著しく低速化するため
	document.getElementById('demo-play-btn').textContent='⏸';
	speak(makeVoiceText('depart','','','',null));
	// デモ開始位置がルート先頭でない場合に備えてシーク
	seekNearestStep(demoCoords[0]);
	updateNaviBanner(naviCurrentStepIdx,null);
	highlightNaviStep(naviCurrentStepIdx);
	// fitBounds 後に RAF 開始：ズームアニメーション中の CSS transition 競合を防止する
	goToMap();setTimeout(()=>{
		map.fitBounds(L.latLngBounds(demoCoords),{padding:[40,40],animate:false});
		// マーカーの CSS transition を無効化してカクつき・バウンスを防ぐ
		const el=demoMarker&&demoMarker.getElement();
		if(el){el.style.transition='none';el.style.webkitTransition='none';}
		logDebug('[startDemo] インターバルタイマー登録直前');
		// RAF はブラウザのアイドル最適化でスロットリングされるため setInterval を使用する
		demoRafId=setInterval(()=>demoTick(performance.now()),33);
		logDebug('[startDemo] インターバルタイマー登録完了 → demoTick 開始');
	},100);
}
function demoTick(ts){
	if(demoPaused||demoIdx>=demoCoords.length-1)return;
	try{
		if(!lastDemoTs)lastDemoTs=ts;
		const dt=Math.min((ts-lastDemoTs)/1000,.1);lastDemoTs=ts;
		let remain=BASE_SPD*demoSpeed*dt;
		let curPos=null;

		while(remain>0&&demoIdx<demoCoords.length-1){
			const a=demoCoords[demoIdx],b=demoCoords[demoIdx+1];
			const seg=haversine(a,b);
			// demoFrac: 現在セグメント内の累積進捗割合（0.0〜1.0）を保持し、毎ティック先頭に戻る振動バグを防ぐ
			const segRemain=seg*(1-demoFrac); // セグメント内の残り距離
			if(remain>=segRemain){
				// 残りセグメントを丸ごと通過 → 次セグメントへ
				remain-=segRemain;
				demoIdx++;
				demoFrac=0;
				curPos=demoCoords[demoIdx];
			}else{
				// セグメント途中 → 割合を累積して次ティックに引き継ぐ
				demoFrac+=remain/seg;
				curPos=[a[0]+(b[0]-a[0])*demoFrac, a[1]+(b[1]-a[1])*demoFrac];
				remain=0;
			}
		}

		// フレームごとに1回だけマーカー更新・案内チェック
		// ※ map.setView は呼ばない → 地図が車を追わず、車がルート上を視覚的に移動する
		if(curPos){
			demoMarker.setLatLng(curPos);
			// demoTrail は廃止（毎フレームのSVG再描画がRAFを低速化するため）
			updateDemoProg();
			if(naviActive)checkAndSpeak(curPos);
		}

		// 進捗マイルストーンログ（25/50/75/100%）
		const prog=demoCoords.length>1?(demoIdx/(demoCoords.length-1))*100:0;
		if(prog>=25&&prog<26&&!demoMilestone25){demoMilestone25=true;console.log('[demoTick] 進捗 25%');logDebug('[demoTick] 進捗 25%');}
		if(prog>=50&&prog<51&&!demoMilestone50){demoMilestone50=true;console.log('[demoTick] 進捗 50%');logDebug('[demoTick] 進捗 50%');}
		if(prog>=75&&prog<76&&!demoMilestone75){demoMilestone75=true;console.log('[demoTick] 進捗 75%');logDebug('[demoTick] 進捗 75%');}

		if(demoIdx>=demoCoords.length-1){
			const last=demoCoords[demoCoords.length-1];
			demoMarker.setLatLng(last);
			document.getElementById('demo-play-btn').textContent='▶';
			document.getElementById('demo-progress-bar').style.width='100%';
			console.log('[demoTick] デモ走行 100% 完了');
			logDebug('[demoTick] デモ走行 100% 完了');
			speak(makeVoiceText('arrive','','','',null));
			showStatus('🏁 デモ走行が完了しました','info');
			// 完走時にインターバルをクリアして余分な処理を止める
			if(demoRafId){clearInterval(demoRafId);demoRafId=null;}
			naviActive=false;return;
		}
	}catch(e){
		// 例外が発生してもインターバルループを継続し、ログに記録する
		console.error(`[demoTick] 例外発生（ループ継続）: ${e.message}`,e);
		logError(`[demoTick] 例外: ${e.message}`);
	}
	// setInterval により自動的に次回呼び出しが行われるため RAF 再登録は不要
}
function haversine(a,b){
	const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;
	const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
	return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function updateDemoProg(){const p=demoCoords.length>1?(demoIdx/(demoCoords.length-1))*100:0;document.getElementById('demo-progress-bar').style.width=p+'%';}
function pauseDemo(){console.log('[pauseDemo] デモ一時停止');demoPaused=true;if(demoRafId){clearInterval(demoRafId);demoRafId=null;}document.getElementById('demo-play-btn').textContent='▶';}

function logRouteResponse(data){
	const route=data.routes[0];const wp=data.waypoints||[];
	const coords=route.geometry.coordinates;const dist=route.distance,dur=route.duration;
	const distStr=dist<1000?`${dist.toFixed(0)} m`:`${(dist/1000).toFixed(2)} km`;
	const durStr=dur<3600?`${Math.round(dur/60)} 分`:`${(dur/3600).toFixed(2)} 時間`;
	let wpRows='';wp.forEach((w,i)=>{wpRows+=`<div class="sv-row"><span class="sv-key">waypoints[${i}].name</span><span class="sv-val str">${escHtml(w.name||'—')}</span></div><div class="sv-row"><span class="sv-key">waypoints[${i}].location</span><span class="sv-val coord">[${w.location[0].toFixed(6)}, ${w.location[1].toFixed(6)}]</span></div>`;});
	let legRows='';(route.legs||[]).forEach((leg,li)=>{legRows+=`<div class="sv-row"><span class="sv-key">legs[${li}].distance</span><span class="sv-val num">${leg.distance.toFixed(1)} m</span></div><div class="sv-row"><span class="sv-key">legs[${li}].duration</span><span class="sv-val num">${leg.duration.toFixed(1)} 秒</span></div><div class="sv-row"><span class="sv-key">legs[${li}].steps数</span><span class="sv-val num">${(leg.steps||[]).length}</span></div>`;});
	let stepRows='';let sn=1;
	(route.legs||[]).forEach(leg=>{(leg.steps||[]).forEach(step=>{
		if(!step.name&&step.distance<1)return;
		const d=step.distance<1000?`${step.distance.toFixed(0)}m`:`${(step.distance/1000).toFixed(2)}km`;
		const mType=step.maneuver?.type||'—';const mMod=step.maneuver?.modifier?` (${step.maneuver.modifier})`:'';
		const loc=step.maneuver?.location?`[${step.maneuver.location[0].toFixed(5)}, ${step.maneuver.location[1].toFixed(5)}]`:'—';
		stepRows+=`<tr><td class="tn">${sn++}</td><td class="td">${d}</td><td class="tt">${escHtml(mType+mMod)}</td><td class="tm">${escHtml(step.name||'（名称なし）')}<br><span class="tname">${loc}</span></td></tr>`;
	});});
	const structBody=()=>`
		<div class="sv-sec"><div class="sv-title">▌ トップレベル</div>
		<div class="sv-row"><span class="sv-key">code</span><span class="sv-val str">${escHtml(data.code)}</span></div>
		<div class="sv-row"><span class="sv-key">routes 件数</span><span class="sv-val num">${data.routes.length}</span></div>
		<div class="sv-row"><span class="sv-key">waypoints 件数</span><span class="sv-val num">${wp.length}</span></div></div>
		<div class="sv-sec"><div class="sv-title">▌ waypoints</div>${wpRows||'<div class="sv-row"><span class="sv-val dim">なし</span></div>'}</div>
		<div class="sv-sec"><div class="sv-title">▌ routes[0] サマリー</div>
		<div class="sv-row"><span class="sv-key">distance</span><span class="sv-val num">${distStr}</span></div>
		<div class="sv-row"><span class="sv-key">duration</span><span class="sv-val num">${durStr}</span></div>
		<div class="sv-row"><span class="sv-key">geometry 座標点数</span><span class="sv-val num">${coords.length} 点</span></div>
		<div class="sv-row"><span class="sv-key">始点</span><span class="sv-val coord">[${coords[0][0].toFixed(6)}, ${coords[0][1].toFixed(6)}]</span></div>
		<div class="sv-row"><span class="sv-key">終点</span><span class="sv-val coord">[${coords[coords.length-1][0].toFixed(6)}, ${coords[coords.length-1][1].toFixed(6)}]</span></div></div>
		<div class="sv-sec"><div class="sv-title">▌ legs</div>${legRows}</div>
		<div class="sv-sec"><div class="sv-title">▌ steps（ナビ手順）</div>
		<table class="sv-tbl"><tr><th>#</th><th>距離</th><th>maneuver</th><th>道路名/座標</th></tr>${stepRows||'<tr><td colspan="4" style="color:var(--muted)">なし</td></tr>'}</table></div>`;
	const rawBody=()=>`<div class="log-raw">${syntaxHighlight(JSON.stringify(data,null,2))}</div>`;
	const sEntry=makeEntry('parse',`解析 — ${(dist/1000).toFixed(1)}km / ${Math.round(dur/60)}分`,structBody);
	sEntry.classList.add('open');prependToPane('pane-structured',sEntry);
	const rEntry=makeEntry('res','Raw JSON',rawBody);prependToPane('pane-raw',rEntry);
	const aEntry=makeEntry('res',`レスポンス — ${(dist/1000).toFixed(1)}km`,rawBody);prependToPane('pane-all',aEntry);
}
function syntaxHighlight(json){
	return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
		.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
			let c='raw-num';
			if(/^"/.test(m)){c=/:\s*$/.test(m)?'raw-key':'raw-str';}
			else if(/true|false/.test(m))c='raw-bool';
			else if(/null/.test(m))c='raw-null';
			return`<span class="${c}">${m}</span>`;
		});
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.querySelectorAll('.log-tab').forEach(tab=>{
	tab.addEventListener('click',()=>{
		document.querySelectorAll('.log-tab').forEach(t=>t.classList.remove('active'));
		document.querySelectorAll('.log-pane').forEach(p=>p.classList.remove('active'));
		tab.classList.add('active');document.getElementById('pane-'+tab.dataset.pane).classList.add('active');
	});
});
document.getElementById('log-clear-btn').addEventListener('click',()=>{
	['pane-structured','pane-raw','pane-all'].forEach(id=>document.getElementById(id).innerHTML='<div class="log-empty">クリアされました</div>');
	logCount=0;document.getElementById('log-count').textContent='0';document.getElementById('badge-log').textContent='0';
});

// ════════════════════════════════════════════════
//  GPS・入力イベント
// ════════════════════════════════════════════════
const gpsChk=document.getElementById('gps-start-chk');
const gpsRow=document.getElementById('gps-start-row');
const startInp=document.getElementById('start-input');
const myLocBtn=document.getElementById('my-loc-btn');

gpsChk.addEventListener('change',()=>{
	useGpsAsStart=gpsChk.checked;
	gpsRow.classList.toggle('active',useGpsAsStart);
	startInp.disabled=useGpsAsStart;
	myLocBtn.style.opacity=useGpsAsStart?'0.35':'1';
	myLocBtn.style.pointerEvents=useGpsAsStart?'none':'auto';
	if(useGpsAsStart){if(!isTracking)startGpsTracking();startInp.value='GPS取得中...';if(startMarker){map.removeLayer(startMarker);startMarker=null;startLatLng=null;}}
	else{startInp.value='';if(startMarker){map.removeLayer(startMarker);startMarker=null;startLatLng=null;}}
	updateHint();
});
myLocBtn.addEventListener('click',()=>{
	if(!navigator.geolocation){console.error('[myLocBtn] Geolocation API 未対応');return showStatus('位置情報が利用できません','error');}
	showStatus('<span class="spinner"></span>現在地を取得中...','info');
	navigator.geolocation.getCurrentPosition(async pos=>{
		const ll={lat:pos.coords.latitude,lng:pos.coords.longitude};
		console.log(`[myLocBtn] 現在地取得: (${ll.lat.toFixed(5)}, ${ll.lng.toFixed(5)})`);
		const label=await revGeo(ll.lat,ll.lng);
		setStart(ll,label);goToMap();setTimeout(()=>map.setView([ll.lat,ll.lng],15),100);hideStatus();
		if(!isTracking)startGpsTracking();
	},err=>{console.error(`[myLocBtn] 現在地取得失敗: ${err.message}`);showStatus('現在地の取得に失敗しました','error');});
});
document.getElementById('zoom-in-btn').addEventListener('click',()=>map.zoomIn());
document.getElementById('zoom-out-btn').addEventListener('click',()=>map.zoomOut());
document.getElementById('center-btn').addEventListener('click',()=>{
	if(gpsLatLng)map.setView([gpsLatLng.lat,gpsLatLng.lng],16);
	if(!isTracking)startGpsTracking();
});
document.getElementById('swap-btn').addEventListener('click',()=>{
	if(useGpsAsStart)return;
	const si=startInp.value,ei=document.getElementById('end-input').value;
	startInp.value=ei;document.getElementById('end-input').value=si;
	[startLatLng,endLatLng]=[endLatLng,startLatLng];[startMarker,endMarker]=[endMarker,startMarker];
	if(startMarker)startMarker.setIcon(startIcon);if(endMarker)endMarker.setIcon(endIcon);
	clearRoute();stopDemo();
});
document.querySelectorAll('.mode-btn').forEach(btn=>{
	btn.addEventListener('click',()=>{
		document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
		btn.classList.add('active');selectedMode=btn.dataset.mode;clearRoute();stopDemo();stopNavi();
	});
});
function clearRoute(){if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}stepMarkers.forEach(m=>map.removeLayer(m));stepMarkers=[];}
function clearAll(){
	stopDemo();stopNavi();clearRoute();
	[startMarker,endMarker,gpsMarker,gpsAccCircle].forEach(m=>{if(m)map.removeLayer(m);});
	startMarker=endMarker=gpsMarker=gpsAccCircle=null;
	if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;}
	isTracking=false;gpsLatLng=null;
	document.getElementById('center-btn').classList.remove('on');
	startLatLng=endLatLng=null;
	startInp.value='';document.getElementById('end-input').value='';
	document.getElementById('route-summary').classList.remove('visible');
	document.getElementById('summary-section').style.display='none';
	document.getElementById('steps-section').style.display='none';
	document.getElementById('steps-list').innerHTML='';
	demoSteps=[];demoCoords=[];naviSteps=[];
	gpsChk.checked=false;useGpsAsStart=false;gpsRow.classList.remove('active');
	startInp.disabled=false;myLocBtn.style.opacity='1';myLocBtn.style.pointerEvents='auto';
	hideStatus();updateHint();
}
document.getElementById('route-btn').addEventListener('click',searchRoute);
document.getElementById('clear-btn').addEventListener('click',clearAll);
['start-input','end-input'].forEach(id=>{
	document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')searchRoute();});
});

// 音声リスト読み込み（iOSなどで初回空になる対策）
if(window.speechSynthesis){
	window.speechSynthesis.getVoices();
	window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
}
</script>
