<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteMap — ルート検索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #151820;
    --border: #252a35;
    --accent: #00e5a0;
    --accent2: #0066ff;
    --warn: #ff6b35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --panel-w: 340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--panel-w);
    min-width: var(--panel-w);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    position: relative;
  }

  #sidebar-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Input Section ── */
  #inputs {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.start { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.end   { background: var(--warn);   box-shadow: 0 0 8px var(--warn); }

  .connector {
    width: 1px; height: 18px;
    background: var(--border);
    margin-left: 4px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.15);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .loc-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    padding: 7px 8px;
    font-size: 14px;
    transition: color .2s, border-color .2s;
    flex-shrink: 0;
  }
  .loc-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Buttons ── */
  #controls {
    padding: 14px 22px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 11px 14px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    padding: 11px 14px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text); }

  /* ── Mode Selector ── */
  #mode-select {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .mode-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .mode-btn .icon { font-size: 16px; }
  .mode-btn.active {
    background: rgba(0,229,160,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Results ── */
  #result-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #result-panel::-webkit-scrollbar { width: 4px; }
  #result-panel::-webkit-scrollbar-track { background: transparent; }
  #result-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-title {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Route Summary Card */
  #route-summary {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  #route-summary.visible { display: block; }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .summary-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .summary-unit { font-size: 11px; color: var(--muted); }

  /* Steps */
  #steps-list { display: flex; flex-direction: column; gap: 6px; }

  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    transition: border-color .2s;
  }
  .step-item:hover { border-color: var(--muted); }

  .step-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
    padding-top: 1px;
  }

  .step-text { flex: 1; line-height: 1.5; }

  .step-dist {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Status */
  #status {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    display: none;
  }
  #status.info  { background: rgba(0,102,255,0.15); border: 1px solid rgba(0,102,255,0.4); color: #6fa3ff; }
  #status.error { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.4); color: var(--warn); }
  #status.visible { display: block; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(0,229,160,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Map ── */
  #map {
    flex: 1;
    position: relative;
  }

  /* GPS Center Button */
  #center-btn {
    position: absolute;
    bottom: 80px;
    right: 12px;
    z-index: 900;
    width: 42px;
    height: 42px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    transition: background .2s, border-color .2s, transform .1s;
  }
  #center-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
  #center-btn:active { transform: scale(0.94); }
  #center-btn.tracking { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.1); }

  @keyframes gps-pulse {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
    100% { transform: translate(-50%,-50%) scale(3);   opacity: 0; }
  }

  /* Click hint */
  #map-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
    z-index: 900;
    pointer-events: none;
    transition: opacity .3s;
    white-space: nowrap;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #1a1d25; }
  .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: var(--bg) !important; }

  /* Responsive */
  @media (max-width: 600px) {
    :root { --panel-w: 100vw; }
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: unset; height: 55vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map { height: 45vh; }
  }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">Route<span>Map</span></div>
    <div class="tagline">OSM powered navigation</div>
  </div>

  <div id="inputs">
    <div class="input-row">
      <div class="dot start"></div>
      <input type="text" id="start-input" placeholder="出発地を入力 or 地図をクリック">
      <button class="loc-btn" id="my-loc-btn" title="現在地を使用">📍</button>
    </div>
    <div style="display:flex; align-items:center; padding-left:4px;">
      <div class="connector"></div>
    </div>
    <div class="input-row">
      <div class="dot end"></div>
      <input type="text" id="end-input" placeholder="目的地を入力 or 地図をクリック">
      <button class="loc-btn" id="swap-btn" title="出発地と目的地を入れ替え">⇅</button>
    </div>
  </div>

  <div id="mode-select">
    <button class="mode-btn active" data-mode="driving">
      <span class="icon">🚗</span>車
    </button>
    <button class="mode-btn" data-mode="cycling">
      <span class="icon">🚲</span>自転車
    </button>
    <button class="mode-btn" data-mode="foot">
      <span class="icon">🚶</span>徒歩
    </button>
  </div>

  <div id="controls">
    <button class="btn-primary" id="route-btn">🗺 ルート検索</button>
    <button class="btn-secondary" id="clear-btn">クリア</button>
  </div>

  <div id="result-panel">
    <div id="status"></div>
    <div id="route-summary">
      <div class="section-title">ルート概要</div>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">距離</span>
          <span class="summary-value" id="dist-val">—</span>
          <span class="summary-unit" id="dist-unit">km</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">所要時間</span>
          <span class="summary-value" id="time-val">—</span>
          <span class="summary-unit" id="time-unit">分</span>
        </div>
      </div>
    </div>
    <div id="steps-list"></div>
  </div>
</div>

<!-- ── Map ── -->
<div id="map">
  <div id="map-hint">🖱 地図をクリックして出発地・目的地を設定</div>
  <button id="center-btn" title="自車位置に移動">◎</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Map Init ──
const map = L.map('map', {
  center: [35.6762, 139.6503],
  zoom: 13,
  zoomControl: true
});

// Dark tile layer (CartoDB dark)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

// ── State ──
let startLatLng = null, endLatLng = null;
let startMarker = null, endMarker = null;
let routeLayer = null;
let clickPhase = 'start'; // 'start' | 'end'
let selectedMode = 'driving';

// ── GPS tracking state ──
let gpsMarker = null;       // 自車位置マーカー
let gpsAccCircle = null;    // 精度円
let gpsPulseEl = null;      // パルスDOM要素
let watchId = null;         // watchPosition ID
let isTracking = false;     // トラッキング中フラグ
let gpsLatLng = null;       // 最新GPS座標

// ── Custom markers ──
const makeIcon = (color, label) => L.divIcon({
  className: '',
  html: `<div style="
    width:32px;height:32px;border-radius:50% 50% 50% 0;
    background:${color};border:3px solid #fff;
    transform:rotate(-45deg);
    box-shadow:0 2px 12px rgba(0,0,0,0.5);
    display:flex;align-items:center;justify-content:center;
  "><span style="transform:rotate(45deg);font-size:13px;">${label}</span></div>`,
  iconSize: [32, 32],
  iconAnchor: [16, 32],
  popupAnchor: [0, -32]
});

const startIcon = makeIcon('#00e5a0', '🟢');
const endIcon   = makeIcon('#ff6b35', '🔴');

// ── Geocoding (Nominatim) ──
async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&accept-language=ja`;
  const res = await fetch(url, { headers: { 'User-Agent': 'RouteMapApp/1.0' } });
  const data = await res.json();
  if (!data.length) throw new Error(`"${query}" の場所が見つかりませんでした`);
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
}

async function reverseGeocode(lat, lng) {
  const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`;
  const res = await fetch(url, { headers: { 'User-Agent': 'RouteMapApp/1.0' } });
  const data = await res.json();
  return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

// ── Marker helpers ──
function setStart(latlng, label) {
  if (startMarker) map.removeLayer(startMarker);
  startLatLng = latlng;
  startMarker = L.marker([latlng.lat, latlng.lng], { icon: startIcon }).addTo(map);
  if (label) document.getElementById('start-input').value = label.split(',')[0];
  updateHint();
}

function setEnd(latlng, label) {
  if (endMarker) map.removeLayer(endMarker);
  endLatLng = latlng;
  endMarker = L.marker([latlng.lat, latlng.lng], { icon: endIcon }).addTo(map);
  if (label) document.getElementById('end-input').value = label.split(',')[0];
  updateHint();
}

function updateHint() {
  const hint = document.getElementById('map-hint');
  if (!startLatLng)      hint.textContent = '🖱 地図をクリックして出発地を設定';
  else if (!endLatLng)   hint.textContent = '🖱 地図をクリックして目的地を設定';
  else                   hint.style.opacity = '0';
}

// ── Map click ──
map.on('click', async (e) => {
  const latlng = { lat: e.latlng.lat, lng: e.latlng.lng };
  const label = await reverseGeocode(latlng.lat, latlng.lng);
  if (!startLatLng) {
    setStart(latlng, label);
    clickPhase = 'end';
  } else if (!endLatLng) {
    setEnd(latlng, label);
    clickPhase = 'start';
  } else {
    // cycle: reset start
    setStart(latlng, label);
    if (endMarker) { map.removeLayer(endMarker); endMarker = null; endLatLng = null; }
    document.getElementById('end-input').value = '';
    document.getElementById('map-hint').style.opacity = '1';
    updateHint();
    clearRoute();
  }
});

// ── Status helper ──
function showStatus(msg, type = 'info') {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = `${type} visible`;
}
function hideStatus() {
  document.getElementById('status').className = '';
}

// ── Route Search ──
async function searchRoute() {
  // Resolve text inputs if markers not set
  const si = document.getElementById('start-input').value.trim();
  const ei = document.getElementById('end-input').value.trim();

  showStatus('<span class="spinner"></span>ルートを検索中...', 'info');
  document.getElementById('route-summary').classList.remove('visible');
  document.getElementById('steps-list').innerHTML = '';

  try {
    if (!startLatLng && si) {
      const r = await geocode(si);
      setStart(r, r.name);
    }
    if (!endLatLng && ei) {
      const r = await geocode(ei);
      setEnd(r, r.name);
    }
    if (!startLatLng) throw new Error('出発地を設定してください');
    if (!endLatLng)   throw new Error('目的地を設定してください');

    const modeMap = { driving: 'driving', cycling: 'cycling', foot: 'foot' };
    const profile = modeMap[selectedMode];
    const url = `https://router.project-osrm.org/route/v1/${profile}/${startLatLng.lng},${startLatLng.lat};${endLatLng.lng},${endLatLng.lat}?overview=full&geometries=geojson&steps=true`;

    const res = await fetch(url);
    const data = await res.json();
    if (data.code !== 'Ok') throw new Error('ルートが見つかりませんでした');

    const route = data.routes[0];
    drawRoute(route);
    showSummary(route);
    hideStatus();

  } catch (err) {
    showStatus(`⚠ ${err.message}`, 'error');
  }
}

// ── Draw Route ──
function drawRoute(route) {
  if (routeLayer) map.removeLayer(routeLayer);
  const coords = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);

  // Glow effect: draw thick + thin line
  const glow = L.polyline(coords, { color: 'rgba(0,229,160,0.2)', weight: 12, lineCap: 'round' }).addTo(map);
  const line  = L.polyline(coords, { color: '#00e5a0', weight: 4, lineCap: 'round' }).addTo(map);

  routeLayer = L.layerGroup([glow, line]).addTo(map);
  map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
}

// ── Show Summary ──
function showSummary(route) {
  const dist = route.distance;
  const dur  = route.duration;

  let dVal, dUnit;
  if (dist < 1000) { dVal = dist.toFixed(0); dUnit = 'm'; }
  else             { dVal = (dist/1000).toFixed(1); dUnit = 'km'; }

  let tVal, tUnit;
  if (dur < 3600) { tVal = Math.round(dur/60); tUnit = '分'; }
  else            { tVal = (dur/3600).toFixed(1); tUnit = '時間'; }

  document.getElementById('dist-val').textContent  = dVal;
  document.getElementById('dist-unit').textContent = dUnit;
  document.getElementById('time-val').textContent  = tVal;
  document.getElementById('time-unit').textContent = tUnit;

  document.getElementById('route-summary').classList.add('visible');

  // Steps
  const stepsList = document.getElementById('steps-list');
  if (document.querySelector('.section-title.steps-title')) return;
  const title = document.createElement('div');
  title.className = 'section-title steps-title';
  title.textContent = 'ナビ手順';
  stepsList.appendChild(title);

  const legs = route.legs || [];
  let stepNum = 1;
  legs.forEach(leg => {
    (leg.steps || []).forEach(step => {
      if (!step.name && step.distance < 1) return;
      const item = document.createElement('div');
      item.className = 'step-item';
      const dist = step.distance < 1000
        ? `${step.distance.toFixed(0)}m`
        : `${(step.distance/1000).toFixed(1)}km`;
      const maneuver = translateManeuver(step.maneuver?.type, step.maneuver?.modifier);
      const name = step.name || '道路';
      item.innerHTML = `
        <span class="step-num">${stepNum++}</span>
        <span class="step-text">${maneuver}「${name}」</span>
        <span class="step-dist">${dist}</span>
      `;
      stepsList.appendChild(item);
    });
  });
}

function translateManeuver(type, modifier) {
  const map = {
    'depart': '出発 →',
    'arrive': '🏁 到着',
    'turn': modifier === 'left' ? '⬅ 左折：' : modifier === 'right' ? '➡ 右折：' : '↩ 曲がる：',
    'continue': '→ 直進：',
    'merge': '合流：',
    'roundabout': '🔄 ロータリー：',
    'exit roundabout': '🔄 出口：',
    'fork': modifier === 'left' ? '↖ 左へ：' : '↗ 右へ：',
    'end of road': modifier === 'left' ? '⬅ 突き当たり左：' : '➡ 突き当たり右：',
  };
  return map[type] || '→';
}

// ── Clear ──
function clearRoute() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

function clearAll() {
  clearRoute();
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map.removeLayer(endMarker);   endMarker = null; }
  if (gpsMarker)   { map.removeLayer(gpsMarker);   gpsMarker = null; }
  if (gpsAccCircle){ map.removeLayer(gpsAccCircle);gpsAccCircle = null; }
  if (watchId)     { navigator.geolocation.clearWatch(watchId); watchId = null; }
  isTracking = false; gpsLatLng = null;
  document.getElementById('center-btn').classList.remove('tracking');
  startLatLng = endLatLng = null;
  document.getElementById('start-input').value = '';
  document.getElementById('end-input').value   = '';
  document.getElementById('route-summary').classList.remove('visible');
  document.getElementById('steps-list').innerHTML = '';
  hideStatus();
  document.getElementById('map-hint').style.opacity = '1';
  updateHint();
}

// ── GPS自車位置マーカー ──
function createGpsMarker(lat, lng, accuracy) {
  // パルスアニメーション用のDOM要素をLeafletのDivIconで実現
  const gpsIcon = L.divIcon({
    className: '',
    html: `
      <div style="position:relative;width:20px;height:20px;">
        <div id="gps-pulse" style="
          position:absolute;top:50%;left:50%;
          width:16px;height:16px;
          border-radius:50%;
          background:rgba(0,229,160,0.4);
          transform:translate(-50%,-50%);
          animation:gps-pulse 1.6s ease-out infinite;
        "></div>
        <div style="
          position:absolute;top:50%;left:50%;
          width:14px;height:14px;
          border-radius:50%;
          background:#00e5a0;
          border:3px solid #fff;
          transform:translate(-50%,-50%);
          box-shadow:0 0 10px rgba(0,229,160,0.8);
        "></div>
      </div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });

  if (gpsMarker) map.removeLayer(gpsMarker);
  if (gpsAccCircle) map.removeLayer(gpsAccCircle);

  gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 500 }).addTo(map);
  gpsMarker.bindTooltip('現在地', { permanent: false, direction: 'top' });

  if (accuracy && accuracy < 5000) {
    gpsAccCircle = L.circle([lat, lng], {
      radius: accuracy,
      color: '#00e5a0',
      fillColor: '#00e5a0',
      fillOpacity: 0.06,
      weight: 1,
      dashArray: '4 4',
    }).addTo(map);
  }

  gpsLatLng = { lat, lng };
}

function startGpsTracking() {
  if (!navigator.geolocation) {
    showStatus('この環境では位置情報が利用できません', 'error');
    return;
  }
  if (isTracking) {
    // トラッキング停止
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    isTracking = false;
    document.getElementById('center-btn').classList.remove('tracking');
    document.getElementById('center-btn').title = '自車位置に移動';
    return;
  }

  showStatus('<span class="spinner"></span>GPS取得中...', 'info');

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      hideStatus();
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      createGpsMarker(lat, lng, accuracy);
      isTracking = true;
      document.getElementById('center-btn').classList.add('tracking');
      document.getElementById('center-btn').title = 'GPS追跡中（クリックで停止）';
    },
    (err) => {
      const msgs = {
        1: 'GPS: 位置情報の許可が必要です',
        2: 'GPS: 位置情報を取得できません',
        3: 'GPS: タイムアウトしました',
      };
      showStatus(`⚠ ${msgs[err.code] || 'GPS エラー'}`, 'error');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
  );
}

// ── My Location（出発地セット＋GPS追跡開始）──
document.getElementById('my-loc-btn').addEventListener('click', () => {
  if (!navigator.geolocation) return showStatus('位置情報が利用できません', 'error');
  showStatus('<span class="spinner"></span>現在地を取得中...', 'info');
  navigator.geolocation.getCurrentPosition(async pos => {
    const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    const label = await reverseGeocode(latlng.lat, latlng.lng);
    setStart(latlng, label);
    map.setView([latlng.lat, latlng.lng], 15);
    hideStatus();
    // GPS追跡も開始
    if (!isTracking) startGpsTracking();
  }, () => showStatus('現在地の取得に失敗しました', 'error'));
});

// ── 自車中心ボタン ──
document.getElementById('center-btn').addEventListener('click', () => {
  if (isTracking) {
    // 追跡停止
    startGpsTracking(); // toggleとして機能
  } else {
    // 追跡開始 → 取得後に中心移動
    const origWatch = navigator.geolocation.watchPosition;
    startGpsTracking();
    // 初回取得後に地図を移動
    const checkMove = setInterval(() => {
      if (gpsLatLng) {
        map.setView([gpsLatLng.lat, gpsLatLng.lng], 16);
        clearInterval(checkMove);
      }
    }, 300);
    setTimeout(() => clearInterval(checkMove), 10000);
  }
  // 既にgpsLatLngがあれば即移動
  if (gpsLatLng) {
    map.setView([gpsLatLng.lat, gpsLatLng.lng], 16);
  }
});

// ── Swap ──
document.getElementById('swap-btn').addEventListener('click', () => {
  const si = document.getElementById('start-input').value;
  const ei = document.getElementById('end-input').value;
  document.getElementById('start-input').value = ei;
  document.getElementById('end-input').value   = si;
  [startLatLng, endLatLng] = [endLatLng, startLatLng];
  [startMarker, endMarker] = [endMarker, startMarker];
  if (startMarker) startMarker.setIcon(startIcon);
  if (endMarker)   endMarker.setIcon(endIcon);
  clearRoute();
});

// ── Mode buttons ──
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMode = btn.dataset.mode;
    clearRoute();
  });
});

// ── Route / Clear buttons ──
document.getElementById('route-btn').addEventListener('click', searchRoute);
document.getElementById('clear-btn').addEventListener('click', clearAll);

// ── Enter key ──
['start-input','end-input'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') searchRoute();
  });
});
</script>
