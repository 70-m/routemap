<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteMap — ルート検索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root {
    --bg: #0d0f14; --panel: #151820; --border: #252a35;
    --accent: #00e5a0; --warn: #ff6b35; --demo: #f5c518;
    --text: #e8eaf0; --muted: #6b7280; --panel-w: 340px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: var(--panel-w); min-width: var(--panel-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
  #sidebar-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--text); }
  .tagline { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Inputs */
  #inputs { padding: 14px 22px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 9px; }
  .input-row { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.start { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.end   { background: var(--warn);   box-shadow: 0 0 8px var(--warn); }
  .connector { width: 1px; height: 14px; background: var(--border); margin-left: 4px; }

  input[type="text"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    padding: 9px 12px; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,229,160,.15); }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }

  .loc-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 7px 8px; font-size: 14px; transition: color .2s, border-color .2s; flex-shrink: 0; }
  .loc-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* GPS出発地行 */
  #gps-start-row { display: flex; align-items: center; gap: 8px; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color .2s; }
  #gps-start-row:hover { border-color: var(--muted); }
  #gps-start-row input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  #gps-start-row label { font-size: 12px; color: var(--muted); cursor: pointer; }
  #gps-start-row.active { border-color: var(--accent); background: rgba(0,229,160,.07); }
  #gps-start-row.active label { color: var(--accent); }

  /* Controls */
  #controls { padding: 12px 22px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
  .btn-primary { flex: 1; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 11px; cursor: pointer; transition: opacity .2s, transform .1s; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:active { transform: scale(.97); }
  .btn-secondary { background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; padding: 11px 14px; cursor: pointer; transition: color .2s, border-color .2s; }
  .btn-secondary:hover { color: var(--text); border-color: var(--text); }

  /* Mode */
  #mode-select { padding: 12px 22px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
  .mode-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--muted); font-size: 11px; font-family: 'Noto Sans JP', sans-serif; padding: 8px 4px; cursor: pointer; text-align: center; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .mode-btn .icon { font-size: 15px; }
  .mode-btn.active { background: rgba(0,229,160,.1); border-color: var(--accent); color: var(--accent); }

  /* Demo bar */
  #demo-bar { display: none; padding: 10px 22px; border-bottom: 1px solid var(--border); background: rgba(245,197,24,.05); flex-direction: column; gap: 8px; }
  #demo-bar.visible { display: flex; }
  .demo-label { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--demo); letter-spacing: 1px; text-transform: uppercase; }
  .demo-controls { display: flex; gap: 6px; align-items: center; }
  .demo-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; padding: 6px 10px; cursor: pointer; transition: all .2s; }
  .demo-btn:hover { border-color: var(--demo); color: var(--demo); }
  #demo-speed-label { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'Space Mono', monospace; min-width: 28px; text-align: right; }
  #demo-progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #demo-progress-bar { height: 100%; background: var(--demo); width: 0%; border-radius: 2px; transition: width .15s linear; }

  /* Results */
  #result-panel { flex: 1; overflow-y: auto; padding: 14px 22px; display: flex; flex-direction: column; gap: 10px; }
  #result-panel::-webkit-scrollbar { width: 4px; }
  #result-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-title { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }

  #route-summary { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  #route-summary.visible { display: block; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .summary-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .summary-unit { font-size: 11px; color: var(--muted); }

  #demo-run-btn { margin-top: 12px; width: 100%; background: rgba(245,197,24,.1); border: 1px solid var(--demo); border-radius: 8px; color: var(--demo); font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; padding: 10px; cursor: pointer; letter-spacing: .5px; transition: background .2s; }
  #demo-run-btn:hover { background: rgba(245,197,24,.2); }

  #steps-list { display: flex; flex-direction: column; gap: 6px; }
  .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; transition: border-color .2s, background .2s; }
  .step-item.active-step { border-color: var(--demo); background: rgba(245,197,24,.07); }
  .step-num { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 20px; padding-top: 1px; }
  .step-text { flex: 1; line-height: 1.5; }
  .step-dist { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* Status */
  #status { padding: 10px 12px; border-radius: 8px; font-size: 12px; display: none; }
  #status.info  { display: block; background: rgba(0,102,255,.15); border: 1px solid rgba(0,102,255,.4); color: #6fa3ff; }
  #status.error { display: block; background: rgba(255,107,53,.15); border: 1px solid rgba(255,107,53,.4); color: var(--warn); }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(0,229,160,.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Map */
  #map { flex: 1; position: relative; }
  .map-fab { position: absolute; right: 12px; z-index: 900; width: 42px; height: 42px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,.5); transition: all .2s; }
  .map-fab:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
  .map-fab:active { transform: scale(.93); }
  .map-fab.on { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.1); }
  #center-btn { bottom: 80px; }
  #hint-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(13,15,20,.85); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 20px; padding: 7px 16px; font-size: 12px; color: var(--muted); z-index: 900; pointer-events: none; white-space: nowrap; transition: opacity .3s; }

  @keyframes gps-pulse { 0% { transform: translate(-50%,-50%) scale(1); opacity:.6; } 100% { transform: translate(-50%,-50%) scale(3.5); opacity:0; } }
  @keyframes car-bounce { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.18); } }

  .leaflet-container { background: #1a1d25; }
  .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }

  @media (max-width: 600px) {
    :root { --panel-w: 100vw; }
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: unset; height: 58vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map { height: 42vh; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">Route<span>Map</span></div>
    <div class="tagline">OSM powered navigation</div>
  </div>

  <div id="inputs">
    <!-- GPS出発地チェック -->
    <div id="gps-start-row">
      <input type="checkbox" id="gps-start-chk">
      <label for="gps-start-chk">📍 現在地（GPS）を出発地にする</label>
    </div>
    <div class="input-row">
      <div class="dot start"></div>
      <input type="text" id="start-input" placeholder="出発地を入力 or 地図をクリック">
      <button class="loc-btn" id="my-loc-btn" title="現在地を出発地にセット">📍</button>
    </div>
    <div style="display:flex;align-items:center;padding-left:4px;"><div class="connector"></div></div>
    <div class="input-row">
      <div class="dot end"></div>
      <input type="text" id="end-input" placeholder="目的地を入力 or 地図をクリック">
      <button class="loc-btn" id="swap-btn" title="出発地と目的地を入れ替え">⇅</button>
    </div>
  </div>

  <div id="mode-select">
    <button class="mode-btn active" data-mode="driving"><span class="icon">🚗</span>車</button>
    <button class="mode-btn" data-mode="cycling"><span class="icon">🚲</span>自転車</button>
    <button class="mode-btn" data-mode="foot"><span class="icon">🚶</span>徒歩</button>
  </div>

  <div id="controls">
    <button class="btn-primary" id="route-btn">🗺 ルート検索</button>
    <button class="btn-secondary" id="clear-btn">クリア</button>
  </div>

  <!-- デモ走行コントロールバー -->
  <div id="demo-bar">
    <div class="demo-label">🎬 デモ走行モード</div>
    <div class="demo-controls">
      <button class="demo-btn" id="demo-play-btn">▶</button>
      <button class="demo-btn" id="demo-stop-btn">⏹</button>
      <button class="demo-btn" id="demo-slower-btn" title="減速">🐢</button>
      <button class="demo-btn" id="demo-faster-btn" title="加速">🐇</button>
      <span id="demo-speed-label">1×</span>
    </div>
    <div id="demo-progress"><div id="demo-progress-bar"></div></div>
  </div>

  <div id="result-panel">
    <div id="status"></div>
    <div id="route-summary">
      <div class="section-title">ルート概要</div>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">距離</span>
          <span class="summary-value" id="dist-val">—</span>
          <span class="summary-unit" id="dist-unit">km</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">所要時間</span>
          <span class="summary-value" id="time-val">—</span>
          <span class="summary-unit" id="time-unit">分</span>
        </div>
      </div>
      <button id="demo-run-btn">🎬 デモ走行を開始</button>
    </div>
    <div id="steps-list"></div>
  </div>
</div>

<div id="map">
  <div id="hint-box">🖱 地図をクリックして出発地・目的地を設定</div>
  <button class="map-fab" id="center-btn" title="自車位置に移動">◎</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ════════════════════════════════
//  地図初期化
// ════════════════════════════════
const map = L.map('map', { center: [35.6762, 139.6503], zoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 19
}).addTo(map);

// ════════════════════════════════
//  状態
// ════════════════════════════════
let startLatLng = null, endLatLng   = null;
let startMarker = null, endMarker   = null;
let routeLayer  = null;
let selectedMode = 'driving';

// GPS
let gpsMarker = null, gpsAccCircle = null;
let watchId   = null, isTracking   = false;
let gpsLatLng = null;
let useGpsAsStart = false;

// デモ
let demoCoords   = [];
let demoIdx      = 0;
let demoRafId    = null;
let demoPaused   = true;
let demoSpeed    = 1;
let demoMarker   = null;
let demoTrail    = null;
let lastDemoTs   = null;
let demoSteps    = [];   // { el, lat, lng }

// ════════════════════════════════
//  アイコン
// ════════════════════════════════
const makePin = (color, emoji) => L.divIcon({
  className: '',
  html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${color};border:3px solid #fff;transform:rotate(-45deg);box-shadow:0 2px 12px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px">${emoji}</span></div>`,
  iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-32]
});
const startIcon = makePin('#00e5a0','🟢');
const endIcon   = makePin('#ff6b35','🔴');
const gpsIcon   = L.divIcon({
  className:'',
  html:`<div style="position:relative;width:22px;height:22px;">
    <div style="position:absolute;top:50%;left:50%;width:18px;height:18px;border-radius:50%;background:rgba(0,229,160,.35);animation:gps-pulse 1.6s ease-out infinite;"></div>
    <div style="position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:#00e5a0;border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(0,229,160,.8);"></div>
  </div>`,
  iconSize:[22,22], iconAnchor:[11,11]
});
const carIcon = L.divIcon({
  className:'',
  html:`<div style="position:relative;width:30px;height:30px;">
    <div style="position:absolute;top:50%;left:50%;width:30px;height:30px;border-radius:50%;background:rgba(245,197,24,.3);animation:car-bounce 1s ease-in-out infinite;transform:translate(-50%,-50%);"></div>
    <div style="position:absolute;top:50%;left:50%;font-size:20px;transform:translate(-50%,-50%);">🚗</div>
  </div>`,
  iconSize:[30,30], iconAnchor:[15,15]
});

// ════════════════════════════════
//  ジオコーディング
// ════════════════════════════════
async function geocode(q) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&accept-language=ja`,{headers:{'User-Agent':'RouteMapApp/1.0'}});
  const d = await r.json();
  if (!d.length) throw new Error(`"${q}" の場所が見つかりませんでした`);
  return { lat:parseFloat(d[0].lat), lng:parseFloat(d[0].lon), name:d[0].display_name };
}
async function revGeo(lat,lng) {
  const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja`,{headers:{'User-Agent':'RouteMapApp/1.0'}});
  const d = await r.json();
  return d.display_name || `${lat.toFixed(5)},${lng.toFixed(5)}`;
}

// ════════════════════════════════
//  マーカー
// ════════════════════════════════
function setStart(ll, label) {
  if (startMarker) map.removeLayer(startMarker);
  startLatLng = ll;
  startMarker = L.marker([ll.lat,ll.lng],{icon:startIcon}).addTo(map);
  if (label) document.getElementById('start-input').value = label.split(',')[0];
  updateHint();
}
function setEnd(ll, label) {
  if (endMarker) map.removeLayer(endMarker);
  endLatLng = ll;
  endMarker = L.marker([ll.lat,ll.lng],{icon:endIcon}).addTo(map);
  if (label) document.getElementById('end-input').value = label.split(',')[0];
  updateHint();
}
function updateHint() {
  const h = document.getElementById('hint-box');
  if (useGpsAsStart && !endLatLng)  { h.style.opacity='1'; h.textContent='🖱 地図をクリックして目的地を設定'; }
  else if (!startLatLng)            { h.style.opacity='1'; h.textContent='🖱 地図をクリックして出発地を設定'; }
  else if (!endLatLng)              { h.style.opacity='1'; h.textContent='🖱 地図をクリックして目的地を設定'; }
  else                              { h.style.opacity='0'; }
}

// ════════════════════════════════
//  地図クリック
// ════════════════════════════════
map.on('click', async e => {
  const ll = { lat:e.latlng.lat, lng:e.latlng.lng };
  const label = await revGeo(ll.lat, ll.lng);
  if (useGpsAsStart) {
    setEnd(ll, label);
  } else if (!startLatLng) {
    setStart(ll, label);
  } else if (!endLatLng) {
    setEnd(ll, label);
  } else {
    setStart(ll, label);
    if (endMarker) { map.removeLayer(endMarker); endMarker=null; endLatLng=null; }
    document.getElementById('end-input').value='';
    clearRoute(); stopDemo();
  }
  updateHint();
});

// ════════════════════════════════
//  ステータス
// ════════════════════════════════
function showStatus(msg, type='info') { const el=document.getElementById('status'); el.innerHTML=msg; el.className=type; }
function hideStatus() { const el=document.getElementById('status'); el.innerHTML=''; el.className=''; }

// ════════════════════════════════
//  ルート検索
// ════════════════════════════════
async function searchRoute() {
  stopDemo();
  const si = document.getElementById('start-input').value.trim();
  const ei = document.getElementById('end-input').value.trim();
  showStatus('<span class="spinner"></span>ルートを検索中...','info');
  document.getElementById('route-summary').classList.remove('visible');
  document.getElementById('steps-list').innerHTML='';
  document.getElementById('demo-bar').classList.remove('visible');

  try {
    if (useGpsAsStart) {
      if (!gpsLatLng) throw new Error('GPS位置を取得中です。少々お待ちください');
      if (startMarker) map.removeLayer(startMarker);
      startLatLng = gpsLatLng;
      startMarker = L.marker([gpsLatLng.lat,gpsLatLng.lng],{icon:startIcon}).addTo(map);
      document.getElementById('start-input').value='現在地（GPS）';
    } else {
      if (!startLatLng && si) { const r=await geocode(si); setStart(r,r.name); }
    }
    if (!endLatLng && ei) { const r=await geocode(ei); setEnd(r,r.name); }
    if (!startLatLng) throw new Error('出発地を設定してください');
    if (!endLatLng)   throw new Error('目的地を設定してください');

    const profiles = { driving:'driving', cycling:'cycling', foot:'foot' };
    const url = `https://router.project-osrm.org/route/v1/${profiles[selectedMode]}/${startLatLng.lng},${startLatLng.lat};${endLatLng.lng},${endLatLng.lat}?overview=full&geometries=geojson&steps=true`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.code !== 'Ok') throw new Error('ルートが見つかりませんでした');

    const route = data.routes[0];
    demoCoords = route.geometry.coordinates.map(([lng,lat]) => [lat,lng]);
    drawRoute(route);
    showSummary(route);
    hideStatus();
  } catch(err) {
    showStatus(`⚠ ${err.message}`,'error');
  }
}

// ════════════════════════════════
//  ルート描画
// ════════════════════════════════
function drawRoute(route) {
  if (routeLayer) map.removeLayer(routeLayer);
  const coords = route.geometry.coordinates.map(([lng,lat]) => [lat,lng]);
  const glow = L.polyline(coords,{color:'rgba(0,229,160,.18)',weight:14,lineCap:'round'}).addTo(map);
  const line = L.polyline(coords,{color:'#00e5a0',weight:4,lineCap:'round'}).addTo(map);
  routeLayer = L.layerGroup([glow,line]).addTo(map);
  map.fitBounds(L.latLngBounds(coords),{padding:[40,40]});
}

// ════════════════════════════════
//  概要表示
// ════════════════════════════════
function showSummary(route) {
  const dist=route.distance, dur=route.duration;
  document.getElementById('dist-val').textContent  = dist<1000 ? dist.toFixed(0) : (dist/1000).toFixed(1);
  document.getElementById('dist-unit').textContent = dist<1000 ? 'm':'km';
  document.getElementById('time-val').textContent  = dur<3600  ? Math.round(dur/60) : (dur/3600).toFixed(1);
  document.getElementById('time-unit').textContent = dur<3600  ? '分':'時間';
  document.getElementById('route-summary').classList.add('visible');

  const list = document.getElementById('steps-list');
  list.innerHTML=''; demoSteps=[];
  const title=document.createElement('div'); title.className='section-title'; title.textContent='ナビ手順'; list.appendChild(title);
  let n=1;
  (route.legs||[]).forEach(leg=>{
    (leg.steps||[]).forEach(step=>{
      if (!step.name && step.distance<1) return;
      const d = step.distance<1000 ? `${step.distance.toFixed(0)}m`:`${(step.distance/1000).toFixed(1)}km`;
      const el=document.createElement('div'); el.className='step-item';
      el.innerHTML=`<span class="step-num">${n++}</span><span class="step-text">${maneuverText(step.maneuver?.type,step.maneuver?.modifier)}「${step.name||'道路'}」</span><span class="step-dist">${d}</span>`;
      list.appendChild(el);
      demoSteps.push({el, lat:step.maneuver.location[1], lng:step.maneuver.location[0]});
    });
  });
}
function maneuverText(type,mod) {
  const m={depart:'出発 →',arrive:'🏁 到着',
    turn:mod==='left'?'⬅ 左折：':mod==='right'?'➡ 右折：':'↩ 曲がる：',
    continue:'→ 直進：',merge:'合流：',roundabout:'🔄 ロータリー：',
    'exit roundabout':'🔄 出口：',fork:mod==='left'?'↖ 左へ：':'↗ 右へ：',
    'end of road':mod==='left'?'⬅ 突き当たり左：':'➡ 突き当たり右：'};
  return m[type]||'→';
}

// ════════════════════════════════
//  デモ走行
// ════════════════════════════════
const BASE_SPD = 60; // m/s 相当（1×）

function startDemo() {
  if (demoCoords.length < 2) return;
  stopDemo();
  document.getElementById('demo-bar').classList.add('visible');
  demoIdx=0; demoPaused=false; lastDemoTs=null;
  document.getElementById('demo-progress-bar').style.width='0%';

  if (demoMarker) map.removeLayer(demoMarker);
  if (demoTrail)  map.removeLayer(demoTrail);
  demoMarker = L.marker(demoCoords[0],{icon:carIcon,zIndexOffset:1000}).addTo(map);
  demoTrail  = L.polyline([demoCoords[0]],{color:'#f5c518',weight:3,opacity:.7}).addTo(map);
  map.setView(demoCoords[0],16);
  document.getElementById('demo-play-btn').textContent='⏸';
  demoRafId = requestAnimationFrame(demoTick);
}

function demoTick(ts) {
  if (demoPaused || demoIdx >= demoCoords.length-1) return;
  if (!lastDemoTs) lastDemoTs=ts;
  const dt = Math.min((ts-lastDemoTs)/1000, 0.1); // 最大100ms
  lastDemoTs=ts;

  let dist = BASE_SPD * demoSpeed * dt;
  while (dist>0 && demoIdx < demoCoords.length-1) {
    const a=demoCoords[demoIdx], b=demoCoords[demoIdx+1];
    const seg=haversine(a,b);
    if (dist>=seg) { dist-=seg; demoIdx++; }
    else {
      const t=dist/seg;
      const pos=[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
      demoMarker.setLatLng(pos);
      demoTrail.addLatLng(pos);
      map.setView(pos, map.getZoom());
      updateDemoProg();
      highlightStep(pos);
      dist=0;
    }
  }
  if (demoIdx>=demoCoords.length-1) {
    demoMarker.setLatLng(demoCoords[demoCoords.length-1]);
    document.getElementById('demo-play-btn').textContent='▶';
    document.getElementById('demo-progress-bar').style.width='100%';
    showStatus('🏁 デモ走行が完了しました','info');
    return;
  }
  demoRafId=requestAnimationFrame(demoTick);
}

function haversine(a,b) {
  const R=6371000, dLat=(b[0]-a[0])*Math.PI/180, dLng=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function updateDemoProg() {
  const pct = demoCoords.length>1 ? (demoIdx/(demoCoords.length-1))*100 : 0;
  document.getElementById('demo-progress-bar').style.width=pct+'%';
}

function highlightStep(pos) {
  let best=Infinity, bestI=-1;
  demoSteps.forEach(({lat,lng},i)=>{ const d=Math.abs(lat-pos[0])+Math.abs(lng-pos[1]); if(d<best){best=d;bestI=i;} });
  demoSteps.forEach(({el},i)=>{ el.classList.toggle('active-step',i===bestI); if(i===bestI) el.scrollIntoView({behavior:'smooth',block:'nearest'}); });
}

function pauseDemo() {
  demoPaused=true;
  if (demoRafId) { cancelAnimationFrame(demoRafId); demoRafId=null; }
  document.getElementById('demo-play-btn').textContent='▶';
}
function resumeDemo() {
  demoPaused=false; lastDemoTs=null;
  document.getElementById('demo-play-btn').textContent='⏸';
  demoRafId=requestAnimationFrame(demoTick);
}
function stopDemo() {
  pauseDemo(); demoIdx=0;
  if (demoMarker){map.removeLayer(demoMarker);demoMarker=null;}
  if (demoTrail) {map.removeLayer(demoTrail); demoTrail=null;}
  document.getElementById('demo-bar').classList.remove('visible');
  document.getElementById('demo-progress-bar').style.width='0%';
  demoSteps.forEach(({el})=>el.classList.remove('active-step'));
}

document.getElementById('demo-run-btn').addEventListener('click', startDemo);
document.getElementById('demo-play-btn').addEventListener('click',()=>{ if(demoPaused)resumeDemo();else pauseDemo(); });
document.getElementById('demo-stop-btn').addEventListener('click', stopDemo);
document.getElementById('demo-faster-btn').addEventListener('click',()=>{ demoSpeed=Math.min(demoSpeed*2,16); document.getElementById('demo-speed-label').textContent=demoSpeed+'×'; });
document.getElementById('demo-slower-btn').addEventListener('click',()=>{ demoSpeed=Math.max(demoSpeed/2,0.5); document.getElementById('demo-speed-label').textContent=demoSpeed+'×'; });

// ════════════════════════════════
//  GPS追跡
// ════════════════════════════════
function updateGpsMarker(lat,lng,acc) {
  if (gpsMarker)    map.removeLayer(gpsMarker);
  if (gpsAccCircle) map.removeLayer(gpsAccCircle);
  gpsMarker=L.marker([lat,lng],{icon:gpsIcon,zIndexOffset:500}).addTo(map);
  gpsMarker.bindTooltip('現在地',{permanent:false,direction:'top'});
  if (acc<5000) gpsAccCircle=L.circle([lat,lng],{radius:acc,color:'#00e5a0',fillColor:'#00e5a0',fillOpacity:.05,weight:1,dashArray:'4 4'}).addTo(map);
  gpsLatLng={lat,lng};
  // GPS出発地モードなら出発マーカーも追従
  if (useGpsAsStart) {
    if (startMarker) map.removeLayer(startMarker);
    startLatLng=gpsLatLng;
    startMarker=L.marker([lat,lng],{icon:startIcon}).addTo(map);
    document.getElementById('start-input').value='現在地（GPS）';
  }
}

function startGpsTracking() {
  if (!navigator.geolocation){showStatus('位置情報APIが使えません','error');return;}
  if (isTracking){
    navigator.geolocation.clearWatch(watchId); watchId=null; isTracking=false;
    document.getElementById('center-btn').classList.remove('on'); return;
  }
  showStatus('<span class="spinner"></span>GPS取得中...','info');
  watchId=navigator.geolocation.watchPosition(
    pos=>{
      hideStatus();
      updateGpsMarker(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy);
      isTracking=true;
      document.getElementById('center-btn').classList.add('on');
    },
    err=>{
      const m={1:'位置情報の許可が必要です',2:'位置を取得できません',3:'タイムアウト'};
      showStatus(`⚠ GPS: ${m[err.code]||'エラー'}`,'error');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:3000}
  );
}

// ════════════════════════════════
//  GPS出発地チェックボックス
// ════════════════════════════════
const gpsChk   = document.getElementById('gps-start-chk');
const gpsRow   = document.getElementById('gps-start-row');
const startInp = document.getElementById('start-input');
const myLocBtn = document.getElementById('my-loc-btn');

gpsChk.addEventListener('change',()=>{
  useGpsAsStart=gpsChk.checked;
  gpsRow.classList.toggle('active',useGpsAsStart);
  startInp.disabled=useGpsAsStart;
  myLocBtn.style.opacity=useGpsAsStart?'0.35':'1';
  myLocBtn.style.pointerEvents=useGpsAsStart?'none':'auto';

  if (useGpsAsStart) {
    if (!isTracking) startGpsTracking();
    startInp.value='GPS取得中...';
    if (startMarker){map.removeLayer(startMarker);startMarker=null;startLatLng=null;}
  } else {
    startInp.value='';
    if (startMarker){map.removeLayer(startMarker);startMarker=null;startLatLng=null;}
  }
  updateHint();
});

// ════════════════════════════════
//  📍 現在地ボタン（手動出発地セット）
// ════════════════════════════════
myLocBtn.addEventListener('click',()=>{
  if (!navigator.geolocation) return showStatus('位置情報が利用できません','error');
  showStatus('<span class="spinner"></span>現在地を取得中...','info');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const ll={lat:pos.coords.latitude,lng:pos.coords.longitude};
    const label=await revGeo(ll.lat,ll.lng);
    setStart(ll,label);
    map.setView([ll.lat,ll.lng],15);
    hideStatus();
    if (!isTracking) startGpsTracking();
  },()=>showStatus('現在地の取得に失敗しました','error'));
});

// ◎ 自車中心ボタン
document.getElementById('center-btn').addEventListener('click',()=>{
  if (gpsLatLng) map.setView([gpsLatLng.lat,gpsLatLng.lng],16);
  if (!isTracking) startGpsTracking();
});

// ⇅ 入れ替え
document.getElementById('swap-btn').addEventListener('click',()=>{
  if (useGpsAsStart) return;
  const si=startInp.value, ei=document.getElementById('end-input').value;
  startInp.value=ei; document.getElementById('end-input').value=si;
  [startLatLng,endLatLng]=[endLatLng,startLatLng];
  [startMarker,endMarker]=[endMarker,startMarker];
  if (startMarker) startMarker.setIcon(startIcon);
  if (endMarker)   endMarker.setIcon(endIcon);
  clearRoute(); stopDemo();
});

// ════════════════════════════════
//  クリア
// ════════════════════════════════
function clearRoute(){if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}}

function clearAll(){
  stopDemo(); clearRoute();
  [startMarker,endMarker,gpsMarker,gpsAccCircle].forEach(m=>{if(m)map.removeLayer(m);});
  startMarker=endMarker=gpsMarker=gpsAccCircle=null;
  if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;}
  isTracking=false;gpsLatLng=null;
  document.getElementById('center-btn').classList.remove('on');
  startLatLng=endLatLng=null;
  startInp.value=''; document.getElementById('end-input').value='';
  document.getElementById('route-summary').classList.remove('visible');
  document.getElementById('steps-list').innerHTML='';
  demoSteps=[]; demoCoords=[];
  gpsChk.checked=false; useGpsAsStart=false;
  gpsRow.classList.remove('active');
  startInp.disabled=false; myLocBtn.style.opacity='1'; myLocBtn.style.pointerEvents='auto';
  hideStatus();
  updateHint();
}

// ════════════════════════════════
//  移動手段・ルート・クリアボタン
// ════════════════════════════════
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); selectedMode=btn.dataset.mode;
    clearRoute(); stopDemo();
  });
});
document.getElementById('route-btn').addEventListener('click',searchRoute);
document.getElementById('clear-btn').addEventListener('click',clearAll);
['start-input','end-input'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')searchRoute();});
});
</script>
